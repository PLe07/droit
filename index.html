<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCG Hub | Droit & Comptabilité</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --radius:10px; --shadow:0 4px 24px rgba(0,0,0,.45); --sidebar-w:285px; }

body.theme-droit {
  --bg:#0f0f14; --bg2:#161620; --bg3:#1e1e2e;
  --border:#2a2a3e; --border2:#363650;
  --accent:#6c63ff; --accent2:#a78bfa;
  --gold:#f0c040; --green:#4ade80; --red:#f87171; --orange:#fb923c;
  --text:#e8e8f0; --text-dim:#8888aa; --text-mute:#555570; --box-accent:#a78bfa;
}
body.theme-compta {
  --bg:#0d1117; --bg2:#141b22; --bg3:#1c2530;
  --border:#253040; --border2:#334455;
  --accent:#22c55e; --accent2:#4ade80;
  --gold:#f0c040; --blue:#60a5fa; --red:#f87171; --orange:#fb923c;
  --text:#e2e8f0; --text-dim:#8899aa; --text-mute:#445566; --box-accent:#60a5fa;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;transition:background .3s,color .3s}

#topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:var(--bg);opacity:.96;backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 18px;transition:border-color .3s,background .3s}
#hamburger{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:22px;display:none;padding:4px}
.subject-selector{background:var(--bg3);border:1px solid var(--border2);color:var(--accent2);font-family:'Playfair Display',serif;font-size:17px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;outline:none;transition:border-color .2s}
.subject-selector:focus{border-color:var(--accent)}
.mode-bar{display:flex;gap:4px;margin-left:auto}
.mode-btn{background:none;border:1px solid transparent;color:var(--text-dim);font-family:'Source Sans 3',sans-serif;font-size:13px;padding:5px 11px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
.mode-btn:hover{color:var(--text);background:var(--bg3)}
.mode-btn.active{color:var(--accent2);background:rgba(255,255,255,.08);border-color:var(--accent)}
#chapter-title-bar{font-size:13px;color:var(--text-dim);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

#overlay{display:none;position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.6)}
#overlay.show{display:block}
#sidebar{position:fixed;top:56px;left:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;z-index:200;transition:transform .28s cubic-bezier(.4,0,.2,1),background .3s,border-color .3s;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
#main{margin-top:56px;margin-left:var(--sidebar-w);padding:32px 40px 80px;max-width:920px;min-height:calc(100vh - 56px)}

#nav-tree{padding:12px 0 24px}
.partie-group{margin-bottom:6px}
.partie-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mute);padding:16px 16px 6px}
.ch-btn{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--text-dim);font-family:'Source Sans 3',sans-serif;font-size:13.5px;padding:8px 16px;text-align:left;cursor:pointer;transition:all .15s;border-left:3px solid transparent;line-height:1.35}
.ch-btn:hover{background:var(--bg3);color:var(--text)}
.ch-btn.active{background:rgba(255,255,255,.05);color:var(--accent2);border-left-color:var(--accent)}
.ch-id{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg3);color:var(--text-mute);padding:2px 5px;border-radius:4px;flex-shrink:0}
.ch-btn.active .ch-id{background:rgba(255,255,255,.1);color:var(--accent2)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease both}

.section-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.section-header h2{font-family:'Playfair Display',serif;font-size:26px;color:var(--text);line-height:1.2;width:100%}
.partie-tag{font-size:11px;font-weight:600;background:rgba(255,255,255,.08);color:var(--accent2);padding:3px 9px;border-radius:20px;letter-spacing:.03em}
.ch-id-tag{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg3);color:var(--text-dim);padding:3px 8px;border-radius:5px}

.cours-body{line-height:1.7}
.cours-body h3{font-family:'Playfair Display',serif;font-size:19px;color:var(--accent2);margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.cours-body h4{font-size:15px;font-weight:700;color:var(--text);margin:18px 0 8px}
.cours-body p{margin-bottom:12px;color:var(--text)}
.cours-body b{color:#fff}
.cours-body em{color:var(--accent2);font-style:italic}
.cours-body ul{padding-left:20px;margin-bottom:14px}
.cours-body li{margin-bottom:5px;color:var(--text)}
.cours-body table{width:100%;border-collapse:collapse;margin:16px 0 20px;font-size:14px}
.cours-body th{background:var(--bg3);color:var(--accent2);font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:9px 12px;text-align:left;border:1px solid var(--border)}
.cours-body td{padding:9px 12px;border:1px solid var(--border);color:var(--text);vertical-align:top}
.cours-body tr:nth-child(even) td{background:rgba(255,255,255,.02)}

.compta-table{width:100%;border-collapse:collapse;margin:14px 0;font-family:'JetBrains Mono',monospace;font-size:13px}
.compta-table th{background:var(--bg3);color:var(--box-accent);padding:8px 14px;border:1px solid var(--border);text-align:center}
.compta-table td{padding:7px 14px;border:1px solid var(--border);text-align:right;color:var(--text)}
.compta-table td:first-child{text-align:left;font-family:'Source Sans 3',sans-serif;font-size:14px;color:var(--text-dim)}
.compta-table td.debit{color:var(--red)}
.compta-table td.credit{color:var(--accent2)}

.quote{border-left:3px solid var(--accent);background:rgba(255,255,255,.04);padding:12px 16px;border-radius:0 8px 8px 0;margin:14px 0;font-style:italic;color:var(--text);font-size:15px}
.warn-box{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.3);border-radius:8px;padding:10px 14px;color:var(--orange);font-size:14px;margin:12px 0}
.danger-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;color:var(--red);font-size:14px;margin:12px 0}
.retain-box{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:10px;padding:16px 20px;margin:22px 0}
.retain-box h3{font-family:'Source Sans 3',sans-serif;font-size:14px;font-weight:700;color:var(--box-accent);margin:0 0 10px;padding:0;border:none}
.retain-box ul{padding-left:18px;margin:0}
.retain-box li{font-size:14px;margin-bottom:4px}
.formula-box{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:8px;padding:14px 18px;margin:14px 0;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--box-accent);line-height:1.8}

.vocab-search{margin-bottom:12px}
.vocab-search input{width:100%;max-width:400px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:14px;padding:9px 14px;outline:none;transition:border-color .2s}
.vocab-search input:focus{border-color:var(--accent)}
.vocab-search input::placeholder{color:var(--text-mute)}
.vocab-count{font-size:12px;color:var(--text-mute);margin-bottom:16px}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.vocab-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .2s;overflow:hidden}
.vocab-card:hover{border-color:var(--border2);background:rgba(255,255,255,.05)}
.vocab-card .vt{font-weight:700;font-size:15px;color:var(--accent2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.vocab-card .vt::after{content:'▸';font-size:11px;color:var(--text-mute);margin-left:auto;transition:transform .2s}
.vocab-card.open .vt::after{transform:rotate(90deg)}
.vocab-card .vd{font-size:14px;color:var(--text-dim);line-height:1.5;display:none}
.vocab-card.open .vd{display:block}

.flash-counter{text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);margin-bottom:10px}
.flash-progress{background:var(--bg3);border-radius:4px;height:4px;margin-bottom:8px;overflow:hidden}
.flash-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .3s ease}
.flash-hint{text-align:center;font-size:12px;color:var(--text-mute);margin-bottom:20px}
.flashcard-wrapper{perspective:1200px;margin:0 auto 22px;max-width:640px;height:220px}
.flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer}
.flashcard.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 32px;border-radius:14px;border:1px solid var(--border);text-align:center}
.card-face.front{background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.card-face.back{background:var(--bg);transform:rotateY(180deg);border-color:rgba(255,255,255,.3)}
.card-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mute);margin-bottom:14px}
.card-text{font-size:16px;line-height:1.6;color:var(--text)}
.flash-nav{display:flex;justify-content:center;gap:12px}
.flash-nav button{background:var(--bg3);border:1px solid var(--border2);color:var(--text-dim);font-family:'Source Sans 3',sans-serif;font-size:14px;padding:9px 20px;border-radius:8px;cursor:pointer;transition:all .2s}
.flash-nav button:hover{background:var(--bg2);color:var(--text);border-color:var(--accent)}

.qcm-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.qcm-score-badge{background:rgba(255,255,255,.05);color:var(--accent2);border:1px solid var(--accent);border-radius:20px;font-size:13px;font-weight:600;padding:3px 12px}
.qcm-q{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;transition:border-color .2s}
.qcm-q.answered{border-color:var(--border2)}
.qcm-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent2);margin-bottom:6px}
.qcm-q-text{font-size:15px;margin-bottom:14px;font-weight:600;color:var(--text)}
.opt-list{display:flex;flex-direction:column;gap:7px}
.opt-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);font-family:'Source Sans 3',sans-serif;font-size:14px;padding:9px 14px;border-radius:8px;text-align:left;cursor:pointer;transition:all .2s}
.opt-btn:not(:disabled):hover{background:var(--bg3);color:var(--text);border-color:var(--accent)}
.opt-btn.correct{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.5);color:#4ade80}
.opt-btn.wrong{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.4);color:var(--red)}
.opt-btn:disabled{cursor:default}
.expl-box{display:none;margin-top:12px;background:rgba(255,255,255,.04);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 8px 8px 0;font-size:14px;color:var(--text-dim)}
.expl-box.show{display:block}
.qcm-reset{background:none;border:1px solid var(--border2);color:var(--text-dim);font-family:'Source Sans 3',sans-serif;font-size:14px;padding:9px 18px;border-radius:8px;cursor:pointer;margin-top:8px;transition:all .2s}
.qcm-reset:hover{color:var(--text);border-color:var(--text-dim)}

.metho-box{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:12px;padding:18px 20px;margin-bottom:22px}
.metho-box h4{font-size:14px;color:var(--box-accent);margin-bottom:14px}
.metho-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.metho-step{background:var(--bg2);border-radius:8px;padding:12px 14px}
.step-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:rgba(255,255,255,.2);line-height:1;margin-bottom:4px}
.step-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.step-desc{font-size:12px;color:var(--text-dim);line-height:1.4}
.cas-context{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:20px}
.cas-context h4{font-size:14px;color:var(--gold);margin-bottom:8px}
.cas-context p{font-size:15px;color:var(--text);line-height:1.65}
.cas-q-block{margin-bottom:18px}
.cas-q-block h4{font-size:15px;color:var(--text);margin-bottom:8px}
.cas-q-block textarea{width:100%;min-height:120px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:14px;padding:12px 14px;resize:vertical;outline:none;transition:border-color .2s;line-height:1.6}
.cas-q-block textarea:focus{border-color:var(--accent)}
.corr-toggle-btn{background:none;border:1px solid var(--border2);color:var(--text-dim);font-family:'Source Sans 3',sans-serif;font-size:14px;padding:9px 18px;border-radius:8px;cursor:pointer;margin-bottom:14px;transition:all .2s}
.corr-toggle-btn:hover{color:var(--text);border-color:var(--gold)}
.corr-body{display:none;background:rgba(240,192,64,.04);border:1px solid rgba(240,192,64,.25);border-radius:10px;padding:20px 22px;white-space:pre-wrap;font-size:14px;line-height:1.75;color:var(--text);font-family:'Source Sans 3',sans-serif}
.corr-body.show{display:block}

.welcome-screen{max-width:600px;padding:20px 0}
.welcome-screen h2{font-family:'Playfair Display',serif;font-size:36px;line-height:1.15;color:var(--text);margin-bottom:16px}
.welcome-screen p{font-size:16px;color:var(--text-dim);line-height:1.65;margin-bottom:32px}
.welcome-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.welcome-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:20px 22px;transition:border-color .2s}
.welcome-card:hover{border-color:var(--border2)}
.wc-num{font-family:'Playfair Display',serif;font-size:38px;color:var(--accent2);line-height:1;margin-bottom:4px}
.wc-label{font-size:13px;color:var(--text-dim)}

@media(max-width:768px){
  #hamburger{display:block}
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0;padding:20px 18px 60px}
  .mode-bar{display:none}
  #chapter-title-bar{display:none}
  .welcome-screen h2{font-size:26px}
  .welcome-grid{grid-template-columns:1fr 1fr}
  .metho-steps{grid-template-columns:1fr 1fr}
  .flashcard-wrapper{height:190px}
}
@media(max-width:420px){.welcome-grid{grid-template-columns:1fr}}

#mobile-modes{display:none;position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--bg);opacity:.96;backdrop-filter:blur(14px);border-top:1px solid var(--border);padding:8px 10px 10px;gap:4px;justify-content:space-around}
@media(max-width:768px){#mobile-modes{display:flex}}
.mob-mode-btn{background:none;border:1px solid transparent;color:var(--text-dim);font-family:'Source Sans 3',sans-serif;font-size:11px;padding:6px 8px;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s}
.mob-mode-btn:hover{color:var(--text)}
.mob-mode-btn.active{color:var(--accent2);background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15)}
.mob-icon{font-size:16px}
</style>
</head>
<body class="theme-droit">
<header id="topbar">
  <button id="hamburger" onclick="toggleSidebar()">☰</button>
  <select class="subject-selector" id="subject-selector" onchange="changeSubject(this.value)">
    <option value="droit">⚖️ DCG Droit</option>

  <div id="mobile-modes">

  <button class="mob-mode-btn" onclick="setMode('vocab')"><span class="mob-icon">📚</span>Vocab</button>

</div>
<script>
   const DROIT_CHAPTERS = [
{
  id:'1.1', partie:'P1 — Introduction générale au droit', title:'Introduction au droit',
  cours:`<h3>I. Les finalités du droit</h3>
<div class="quote">Adage latin : <b>« Ubi societas, ibi jus »</b> — Il n'y a pas de société sans droit, ni de droit sans société.</div>
<p>Selon le <b>Vocabulaire Juridique</b> (Cornu), le droit est un <em>« ensemble de règles de conduite socialement édictées et sanctionnées qui s'imposent aux membres de la société »</em>.</p>
<p>Le droit poursuit deux grandes finalités : <b>permettre la vie en société</b> (sécurité des personnes et des biens) et <b>organiser la Société</b> (organisation économique, politique et sociale).</p>
<h3>II. Les caractères de la règle de droit</h3>
<h4>A. Caractère général et abstrait</h4>
<p>La règle de droit <b>s'applique à tous les citoyens</b> de manière impersonnelle. Cela traduit l'égalité devant la loi.</p>
<h4>B. Caractère coercitif</h4>
<p>Le non-respect de la règle de droit fait l'objet d'une <b>sanction étatique</b>. C'est ce qui distingue fondamentalement la règle de droit des autres règles sociales.</p>
<h3>III. Les autres règles sociales : morale et éthique</h3>
<h4>A. La morale</h4>
<p>La morale a pour source une <b>conscience individuelle ou collective</b>. En cas de manquement, la sanction est <b>intérieure</b> (« mauvaise conscience »).</p>
<h4>B. L'éthique</h4>
<p>Les règles d'éthique trouvent leur source dans des <b>chartes ou des codes de déontologie</b>. Les sanctions sont <b>extérieures</b> : atteinte à la réputation.</p>
<h3>IV. Les branches du droit</h3>
<ul>
<li><b>Le droit privé</b> : régit les intérêts particuliers des individus (droit civil, commercial, du travail)</li>
<li><b>Le droit public</b> : régit l'intérêt général des citoyens (droit constitutionnel, administratif, fiscal)</li>
</ul>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Définition Cornu</b> : ensemble de règles socialement édictées et sanctionnées s'imposant aux membres de la société</li>
<li><b>2 caractères</b> : général et abstrait + coercitif</li>
<li><b>Sanctions</b> : Droit = étatique ; Morale = intérieure ; Éthique = extérieure (réputation)</li>
<li><b>Droit privé</b> = intérêts particuliers ; <b>Droit public</b> = intérêt général</li>
</ul></div>`,
  vocab:[
    {t:'Droit (sens objectif)',d:'Ensemble de règles de conduite <b>socialement édictées et sanctionnées</b> qui s\'imposent aux membres de la société (Cornu).'},

  cas:{
    contexte:'M. Dupont est employé dans une grande entreprise. Il découvre que son collègue M. Martin a falsifié ses notes de frais pour 5 000 €. M. Dupont hésite à dénoncer son collègue à la direction. Par ailleurs, l\'entreprise dispose d\'un code de déontologie qui oblige à signaler les fraudes.',
    questions:['<b>Q1</b> : Quelle est la nature des règles en jeu (morale, éthique, droit) ?','<b>Q2</b> : Quelles sanctions M. Martin encourt-il ?','<b>Q3</b> : Si M. Dupont ne dit rien malgré le code de déontologie, peut-il être sanctionné ?'],
    correction:`Q1 — Nature des règles en jeu :
Trois registres coexistent ici :
1) MORALE : conscience individuelle de M. Dupont tiraillé entre loyauté et honnêteté. Sanction intérieure (mauvaise conscience).
2) ÉTHIQUE : le code de déontologie de l'entreprise crée une obligation de signalement. Sanction extérieure (disciplinaire + réputation).
3) DROIT : la falsification de notes de frais est une infraction pénale à sanction étatique.

Q2 — Sanctions de M. Martin :
- Disciplinaires (droit du travail) : licenciement pour faute grave/lourde
- Civiles : restitution des 5 000 € + dommages-intérêts
- Pénales : faux et usage de faux (3 ans + 45 000 €), escroquerie (5 ans + 375 000 €), abus de confiance (3 ans + 375 000 €)

Q3 — Silence de M. Dupont malgré le code de déontologie :
- Sanction morale : oui, intérieure (mauvaise conscience).
- Sanction éthique : oui — le code impose le signalement. M. Dupont risque une sanction disciplinaire (avertissement, blâme).
- Sanction juridique : limitée. Il n'existe pas d'obligation légale générale de dénonciation des délits entre collègues. M. Dupont encourt principalement une sanction éthique/disciplinaire.`
  }

{
  id:'1.2', partie:'P1 — Introduction générale au droit', title:'Les sources du droit',
  cours:`<h3>I. Les sources internationales</h3>
<p>Les sources internationales sont principalement les <b>conventions et traités internationaux</b>. Ils créent des organisations internationales (ONU, OIT, OMC).</p>
<h4>Le Conseil de l'Europe</h4>
<p><b>46 États membres</b> (la Fédération de Russie n'en est plus membre depuis le <b>16 mars 2022</b>). Siège à <b>Strasbourg</b>. Convention européenne de sauvegarde des droits de l'homme (CEDH) signée le <b>4 novembre 1950</b>.</p>
<div class="warn-box">⚠️ À distinguer de l'Union européenne (27 États membres).</div>
<p><b>Adoption</b> = signature au niveau international. <b>Ratification</b> = procédure interne permettant d'intégrer le texte au droit national.</p>
<h3>II. Les sources du droit de l'Union européenne</h3>
<p>L'UE compte <b>27 États membres</b>. Traité en vigueur : <b>Traité de Lisbonne</b>, signé le <b>13 décembre 2007</b>, entré en vigueur le <b>1er décembre 2009</b>. Comprend TUE + TFUE.</p>
<h4>Droit dérivé</h4>
<table>
<tr><th>Acte</th><th>Portée</th><th>Application</th></tr>
<tr><td><b>Directive</b></td><td>Générale et impersonnelle</td><td><b>Transposition obligatoire</b> en droit interne. Prévoit objectif + délai.</td></tr>
<tr><td><b>Règlement</b></td><td>Générale et impersonnelle</td><td><b>Directement applicable</b> (effet direct)</td></tr>
</table>
<h3>III. Les sources nationales</h3>
<h4>A. Le bloc de constitutionnalité</h4>
<p><b>Constitution du 4 octobre 1958</b> (Ve République). Le <b>bloc de constitutionnalité</b> comprend :</p>
<ul>
<li>La Constitution du 4 octobre 1958</li>
<li>Le <b>Préambule de la Constitution du 27 octobre 1946</b></li>
<li>La <b>Déclaration des Droits de l'Homme et du Citoyen de 1789</b></li>
<li>La <b>Charte de l'environnement de 2004</b></li>
</ul>
<h4>B. Les types de lois</h4>
<table>
<tr><th>Type</th><th>Caractéristique</th></tr>
<tr><td><b>Loi constitutionnelle</b></td><td>Révise la Constitution. Approbation par référendum OU par le Congrès à la majorité des <b>3/5</b></td></tr>
<tr><td><b>Loi référendaire</b></td><td>Promulguée suite à un référendum</td></tr>
<tr><td><b>Loi organique</b></td><td>Fixe les modalités d'organisation et de fonctionnement des pouvoirs publics</td></tr>
<tr><td><b>Loi ordinaire</b></td><td>Toutes les lois ne répondant pas aux 3 définitions ci-dessus</td></tr>
</table>
<h4>C. Le règlement et l'ordonnance</h4>
<p><b>Article 37</b> de la Constitution : matières ne relevant pas du domaine de la loi → décrets. L'<b>ordonnance</b> : Gouvernement intervient dans le domaine législatif. Procédure : <b>loi d'habilitation → rédaction → loi de ratification</b>.</p>
<h4>D. La coutume</h4>
<p>2 éléments : <b>matériel</b> (répétition) + <b>psychologique</b> (conviction de son caractère obligatoire).</p>
<h3>IV. La hiérarchie des normes — Pyramide de Kelsen</h3>
<p>De la plus haute à la plus basse : <b>bloc de constitutionnalité → bloc de conventionnalité (traités + UE) → lois → règlements</b>.</p>
<p><b>Contrôle de constitutionnalité a priori</b> : avant la promulgation. Saisine par : Président de la République, Premier Ministre, Président AN, Président Sénat, <b>60 députés</b> ou <b>60 sénateurs</b>.</p>
<p><b>QPC (a posteriori)</b> : soulevée au cours d'un litige. 3 critères : disposition applicable au litige + constitutionnalité non déjà vérifiée + caractère sérieux.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>CEDH</b> : 4 novembre 1950 ; Conseil de l'Europe : 46 États, Strasbourg</li>
<li><b>UE</b> : 27 États ; Traité de Lisbonne : signé 13/12/2007, en vigueur 1/12/2009</li>
<li><b>Directive</b> = transposition obligatoire ; <b>Règlement</b> = effet direct</li>
<li><b>Constitution</b> : 4 octobre 1958</li>
<li><b>Bloc constitutionnalité</b> : Constitution + Préambule 1946 + DDHC 1789 + Charte env. 2004</li>

<li><b>QPC (a posteriori)</b> : 3 critères → applicable + pas déjà vérifiée + caractère sérieux</li>
<li><b>Ordonnance</b> : loi d'habilitation → rédaction → loi de ratification</li>
</ul></div>`,

    correction:`Q1 — Recours possibles :

{
  id:'1.3', partie:'P1 — Introduction générale au droit', title:'La preuve des droits',
  cours:`<h3>I. L'objet et la charge de la preuve</h3>
<p>Il n'est pas nécessaire de <b>prouver la loi</b>. Il faut prouver les <b>faits et actes juridiques</b> dans le cadre d'un litige.</p>
<ul>
<li>Le <b>fait juridique</b> ne recherche pas d'effets de droit (accident, naissance)</li>
<li>L'<b>acte juridique</b> a pour objectif de rechercher des effets de droit (contrat, testament)</li>
</ul>
<div class="quote"><b>Article 9 du Code de procédure civile</b> : <em>« Il incombe à chaque partie de prouver conformément à la loi les faits nécessaires au succès de sa prétention »</em>. Charge sur le <b>demandeur</b>.</div>
<p>En droit civil : procédure <b>accusatoire</b> (preuves apportées par les parties). En droit pénal/administratif : procédure <b>inquisitoire</b> (le juge réunit les preuves).</p>
<h3>II. Les moyens de preuve</h3>
<h4>Système de la preuve légale (actes juridiques &gt; 1 500 €)</h4>
<p>Les actes juridiques portant sur un montant <b>supérieur à 1 500 €</b> doivent être prouvés par un <b>écrit</b>.</p>
<p><b>Exceptions (article 1360 du Code civil)</b> : preuve libre si :</p>
<ul>
<li>Impossibilité <b>matérielle</b> (urgence, accident imprévu)</li>
<li>Impossibilité <b>morale</b> : acte entre membres de la même <b>famille</b>, lien de <b>subordination</b>, partie <b>incapable d'écrire</b></li>
<li><b>Usage</b> de ne pas établir un écrit dans ce domaine</li>
<li>Perte de l'écrit par <b>force majeure</b></li>
</ul>
<h4>Système de la preuve libre</h4>
<p>Applicable pour : les faits juridiques, les actes ≤ 1 500 €, en <b>droit commercial</b>, en <b>droit pénal</b>, en <b>droit du travail</b>.</p>
<h4>L'acte authentique</h4>
<p>Reçu par un <b>officier public</b> (notaire, officier d'état civil). L'<b>original</b> = la <b>minute</b> (conservée par l'officier). Les <b>copies</b> = les <b>expéditions</b>. Pour contester : <b>inscription en faux</b>.</p>
<h4>L'acte sous signature privée (SSP)</h4>
<p>Rédigé directement entre parties. Doit être <b>signé</b>. Formalités :</p>
<ul>
<li><b>Contrat synallagmatique</b> : <b>formalité du double</b></li>
<li><b>Acte unilatéral mentionnant une somme</b> : somme écrite <b>en toutes lettres</b></li>
</ul>
<h4>Autres moyens de preuve</h4>
<table>
<tr><th>Moyen</th><th>Conditions</th><th>Sanction du faux</th></tr>
<tr><td><b>Témoignage</b></td><td>Personnes majeures capables. Appréciation souveraine des juges du fond.</td><td><b>5 ans + 75 000 €</b></td></tr>
<tr><td><b>Présomptions de fait</b></td><td>Doivent être <b>graves, précises et concordantes</b>.</td><td>—</td></tr>
<tr><td><b>Serment décisoire</b></td><td>Demandé par une partie à l'autre. <b>Met fin au litige définitivement</b>.</td><td><b>3 ans + 45 000 €</b></td></tr>
<tr><td><b>Serment supplétoire</b></td><td>Déféré d'office par le juge. <b>Ne met pas fin au litige</b>.</td><td><b>3 ans + 45 000 €</b></td></tr>
<tr><td><b>Aveu judiciaire</b></td><td>Au cours de l'instruction/audience. <b>Indivisible et irrévocable</b>.</td><td>—</td></tr>
<tr><td><b>Aveu extrajudiciaire</b></td><td>Hors juge. <b>Divisible et rétractable</b>.</td><td>—</td></tr>
</table>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Art. 9 CPC</b> : charge de la preuve sur le demandeur</li>
<li><b>Seuil 1 500 €</b> : preuve légale (écrit) au-delà / libre en deçà</li>
<li><b>Art. 1360 exceptions</b> : impossibilité matérielle/morale, usage, force majeure</li>
<li><b>Minute</b> = original acte authentique ; <b>Expédition</b> = copie</li>
<li><b>Inscription en faux</b> = seule façon de contester un acte authentique</li>
<li><b>SSP synallagmatique</b> → formalité du double</li>
<li><b>Faux témoignage</b> : 5 ans + 75 000 € ; <b>Faux serment</b> : 3 ans + 45 000 €</li>
<li><b>Aveu judiciaire</b> : indivisible et irrévocable</li>
<li><b>Présomptions de fait</b> : graves, précises et concordantes</li>
<li><b>Preuve libre</b> : droit commercial, pénal, travail</li>
</ul></div>`,

Le SMS constitue à la fois :
- Un COMMENCEMENT DE PREUVE PAR ÉCRIT (art. 1362) : émanant du frère, rendant vraisemblable le prêt. Peut être complété par tout moyen.
- Un AVEU EXTRAJUDICIAIRE : divisible et rétractable, mais soumis à l'appréciation des juges du fond.
- Un ÉCRIT ÉLECTRONIQUE : même force probante que l'écrit papier si l'auteur est identifiable.

<h4>Cour européenne des Droits de l'Homme (CEDH)</h4>
<p><b>Créée en 1959. Siège à Strasbourg.</b> Conditions pour la saisir : avoir <b>épuisé toutes les voies de recours internes</b> + saisine au <b>plus tard 4 mois après la dernière décision interne</b> + être <b>personnellement et directement victime</b>.</p>
<h4>CJUE — Cour de justice de l'Union européenne</h4>
<p>Créée en <b>1952</b>. Siège à <b>Luxembourg</b>. Compétences : <b>renvoi préjudiciel</b>, <b>recours en manquement</b>, <b>recours en annulation</b>, <b>pourvoi</b> contre le Tribunal.</p>
<h3>II. Les juridictions nationales</h3>
<h4>Ordre administratif</h4>
<table>
<tr><th>Degré</th><th>Juridiction</th></tr>
<tr><td>1er degré</td><td>Tribunal administratif</td></tr>
<tr><td>2e degré</td><td>Cour administrative d'appel</td></tr>
<tr><td>Haute juridiction</td><td><b>Conseil d'État</b> (un seul pour la France)</td></tr>
</table>
<h4>Ordre judiciaire — Droit commun</h4>
<table>
<tr><th>Degré</th><th>Juridiction</th></tr>
<tr><td>1er degré</td><td><b>Tribunal judiciaire</b> (litiges civils &gt; 10 000 €) ou <b>Tribunal de proximité</b> (≤ 10 000 €, juge unique)</td></tr>
<tr><td>2e degré</td><td><b>Cour d'appel</b> (36 en France)</td></tr>
<tr><td>Haute juridiction</td><td><b>Cour de cassation</b> (6 chambres : 3 civiles, commerciale, sociale, criminelle)</td></tr>
</table>
<h4>Juridictions d'exception</h4>
<ul>
<li><b>Tribunal de commerce</b> : litiges entre commerçants. Juges <b>élus parmi les commerçants</b>.</li>
<li><b>Conseil de prud'hommes</b> : litiges salarié/employeur. Conseillers prud'hommes <b>élus parmi employeurs et salariés</b>.</li>
<li><b>Juridictions pénales</b> : Tribunal de police (contraventions) / Tribunal correctionnel (délits) / Cour d'assises (crimes)</li>

<h3>III. Compétences et procédure</h3>
<p><b>Compétence matérielle</b> (d'attribution) : détermine la juridiction selon <b>l'objet du litige</b>.</p>

<p><b>Prescription de droit commun : 5 ans</b>. Délai d'appel : <b>1 mois</b>. Pas d'appel si ≤ <b>5 000 €</b> (dernier ressort).</p>

<p><b>ENM</b> : 31 mois. <b>CAPA</b> (avocat) : 18 mois. <b>Commissaires de justice</b> (depuis <b>1er juillet 2022</b>) : regroupent huissiers + commissaires-priseurs judiciaires.</p>

  id:'1.5', partie:'P1 — Introduction générale au droit', title:'Les MARD',
  cours:`<h3>Modes Alternatifs de Règlement des Différends</h3>
<p>Les MARD permettent de résoudre les litiges sans recourir à la procédure judiciaire étatique. Contribuent au <b>délai raisonnable</b> de la justice.</p>
<h3>I. La conciliation</h3>
<p><b>Objectif</b> : proposer aux parties une solution au litige.</p>
<p>Le <b>conciliateur de justice</b> est un auxiliaire de justice assermenté exerçant à <b>titre bénévole</b> → <b>gratuit</b> pour les parties.</p>
<p><b>Préalable obligatoire</b> à l'audience pour : litiges <b>≤ 5 000 €</b> et conflits de voisinage. En droit du travail : <b>bureau de conciliation et d'orientation</b> (étape obligatoire).</p>
<p>Issue : <b>procès-verbal d'accord ou de désaccord</b>. Force exécutoire : <b>homologation par le juge</b>.</p>
<h3>II. La médiation</h3>
<p><b>Objectif</b> : aider les parties à parvenir à un accord. Médiateur <b>choisi et rémunéré par les parties</b> (à défaut d'accord : à parts égales).</p>
<div class="warn-box">⚠️ Exception : en droit de la consommation, le consommateur peut saisir <b>gratuitement</b> un médiateur de la consommation.</div>
<p>Issue : délai de réflexion de <b>8 jours</b> → constat d'accord ou de désaccord. Force exécutoire : <b>homologation du juge</b>.</p>
<h3>III. L'arbitrage</h3>
<h4>A. Clause compromissoire (avant le litige)</h4>
<p>À peine de nullité : <b>écrite</b> + <b>désigner les arbitres</b> (ou leurs modalités). La clause est <b>autonome par rapport au contrat</b>.</p>
<div class="danger-box">⚠️ Non valable dans les <b>contrats de travail</b> et les <b>actes mixtes</b>.</div>
<h4>B. Compromis d'arbitrage (après le litige)</h4>
<p>À peine de nullité : doit mentionner l'<b>objet du litige</b>.</p>
<h4>Le tribunal arbitral</h4>
<p>Composé d'un <b>nombre impair d'arbitres</b> statuant à la <b>majorité des voix</b>. Peut statuer <b>en droit</b> ou <b>en amiable compositeur</b> (en équité). Force exécutoire : ordonnance d'<b>exequatur</b> du <b>Tribunal judiciaire</b>.</p>
<h3>IV. Décret du 29 juillet 2023</h3>
<ul>
<li><b>Audience de règlement amiable</b> : menée par un juge hors formation de jugement.</li>
<li><b>Césure du procès</b> : décision partielle sur le point le plus important. Demandée par les parties.</li>
</ul>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Conciliation</b> : gratuite (bénévole) ; <b>Médiation</b> : payante (sauf conso)</li>
<li><b>Préalable obligatoire</b> : litiges ≤ 5 000 € + conflits de voisinage</li>
<li><b>Délai réflexion médiation</b> : 8 jours</li>
<li><b>Clause compromissoire</b> : écrite + autonome ; NON valable dans contrats travail et actes mixtes</li>
<li><b>Compromis d'arbitrage</b> : après litige, doit mentionner l'objet du litige</li>
<li><b>Tribunal arbitral</b> : nombre impair, droit ou amiable compositeur</li>
<li><b>Force exécutoire sentence</b> : ordonnance d'exequatur du TJ</li>
<li><b>Décret 29 juillet 2023</b> : audience de règlement amiable + césure du procès</li>
</ul></div>`,

  cas:{
    contexte:'La société Alpha (commerçante) et la société Bêta (commerçante) ont un contrat incluant une clause : « Tout litige sera soumis à un tribunal arbitral de 2 arbitres ». M. Durand (consommateur) a un litige de 3 200 € avec la société Gamma sans tentative amiable préalable.',
    questions:['<b>Q1</b> : La clause d\'arbitrage Alpha/Bêta est-elle valable ?','<b>Q2</b> : L\'action de M. Durand contre Gamma est-elle recevable sans tentative amiable ?','<b>Q3</b> : Si la médiation aboutit à un accord, quand aura-t-il force exécutoire ?'],
    correction:`Q1 — Validité de la clause Alpha/Bêta :
La clause est valable entre commerçants. Cependant, elle prévoit 2 arbitres (nombre PAIR). Or le tribunal arbitral doit être composé d'un nombre IMPAIR. La clause est viciée sur ce point : les parties doivent s'accorder sur un 3e arbitre ou un arbitre unique.

Q2 — Recevabilité de M. Durand sans tentative amiable :
3 200 € < 5 000 € → le préalable obligatoire (conciliation/médiation) s'applique. L'action est donc NON RECEVABLE sans tentative préalable. M. Durand doit d'abord tenter une conciliation ou médiation.

Q3 — Force exécutoire de l'accord de médiation :
L'accord de médiation n'est pas automatiquement exécutoire. Il doit être HOMOLOGUÉ par le juge pour acquérir force exécutoire. Avant l'homologation, il a seulement force contractuelle.`
  }
},
{
  id:'2.1', partie:'P2 — Les personnes et les biens', title:'Les personnes',
  cours:`<h3>I. La notion de personne juridique</h3>
<p>La personnalité juridique est l'<em>« aptitude à être titulaire actif ou passif de droits subjectifs »</em> (Prof. Terré). Elle permet de faire valoir ses droits et de réaliser des actes juridiques.</p>
<h4>Personnes physiques</h4>
<p>Tout être humain. Personnalité juridique acquise à la <b>naissance</b> (né vivant) et perdue au <b>décès</b>. Exception : <b>infans conceptus pro nato habetur quoties de commodis ejus agitur</b> — l'enfant conçu peut hériter s'il naît viable.</p>
<h4>Personnes morales</h4>
<p>Entité abstraite à qui la loi reconnaît des droits et des obligations. Personnalité juridique distincte de celle des membres. Immatriculation au <b>RNE</b> (depuis 1er janvier 2023). Fin = <b>dissolution</b>. Règle : <b>1 personne juridique = 1 patrimoine</b>. Principe de <b>spécialité</b> : agit uniquement dans son objet social.</p>
<h3>II. Capacité juridique</h3>
<p><b>Capacité de jouissance</b> = aptitude à acquérir des droits. <b>Capacité d'exercice</b> = aptitude à exercer les droits dont on est titulaire. L'<b>incapacité d'exercice</b> concerne les mineurs non émancipés et les majeurs protégés.</p>
<h3>III. Classification des actes juridiques</h3>
<table>
<tr><th>Type</th><th>Définition</th></tr>
<tr><td><b>Actes de la vie courante</b></td><td>Vie quotidienne, faible montant</td></tr>
<tr><td><b>Actes conservatoires/d'administration</b></td><td>Éviter une perte, gestion normale d'un bien</td></tr>
<tr><td><b>Actes de disposition</b></td><td>Opération grave qui engage le patrimoine (vente, hypothèque)</td></tr>
</table>
<h3>IV. Protection des mineurs (majorité : 18 ans depuis 1974)</h3>
<ul>
<li>Actes de la <b>vie courante</b> → mineur seul (sauf lésion)</li>
<li>Actes d'<b>administration</b> → représentation par les parents</li>
<li>Actes de <b>disposition</b> → représentation + autorisation du juge des tutelles. Seul → <b>nullité relative</b></li>
</ul>
<p>Émancipation possible à <b>16 ans</b>.</p>
<h3>V. Protection des majeurs</h3>
<p>Justifiée uniquement par une <b>altération médicalement établie des facultés</b>. Principes : <b>nécessité</b>, <b>subsidiarité</b>, <b>proportionnalité</b>, <b>limitation dans le temps</b>. Le majeur protégé peut toujours accomplir seul les <b>actes purement personnels</b> (déclaration de naissance, vote, mariage…).</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Personnalité juridique PF</b> : naissance → décès</li>
<li><b>Personnalité juridique PM</b> : immatriculation RNE → dissolution</li>
<li><b>Principe de spécialité (PM)</b> : objet social uniquement</li>
<li><b>1 PJ = 1 patrimoine</b></li>
<li><b>Majorité</b> : 18 ans ; émancipation : 16 ans</li>
<li><b>Acte de disposition mineur sans autorisation</b> → nullité relative</li>
<li><b>Majeur protégé</b> : toujours actes purement personnels seul</li>
</ul></div>`,

{
  id:'2.2', partie:'P2 — Les personnes et les biens', title:'Les commerçants personnes physiques',
  cours:`<h3>I. La liberté du commerce et de l'industrie</h3>
<p>Affirmée par les <b>décrets d'Allarde des 2 et 17 mars 1791</b>. Valeur constitutionnelle (décision CC du <b>16 janvier 1982</b>).</p>
<h3>II. Les actes de commerce</h3>
<table>
<tr><th>Type</th><th>Exemples</th></tr>
<tr><td><b>Par nature</b></td><td>Négoce (achat pour revendre), transformation industrielle, services (banque, assurance, hôtellerie, spectacles)</td></tr>
<tr><td><b>Par la forme</b></td><td>Lettres de change. Sociétés commerciales par la forme (SNC, SCS, SARL, SA, SAS)</td></tr>
<tr><td><b>Par accessoire</b></td><td>Acte civil devenant commercial car accompli par un commerçant pour son commerce</td></tr>
</table>
<h3>III. Définition et obligations du commerçant</h3>
<p><b>Art. L. 121-1 Code de commerce</b> : <em>« sont commerçants ceux qui exercent des actes de commerce et en font leur profession habituelle »</em>.</p>
<p>Immatriculation au <b>RNE</b> : au plus tôt <b>1 mois avant</b> + au plus tard <b>15 jours après</b> le début de l'activité. Sans immatriculation = <b>commerçant de fait</b>.</p>
<p><b>Comptes annuels</b> : bilan + compte de résultat + annexes → <b>image fidèle</b>. Sanction faux : <b>3 ans + 45 000 €</b>.</p>
<h3>IV. Protection du patrimoine du commerçant</h3>
<p><b>Résidence principale</b> : insaisissable de plein droit (loi Macron, <b>7 août 2015</b>).</p>
<p><b>Statut EI</b> (loi du 14 février 2022, en vigueur le <b>15 mai 2022</b>) : séparation automatique entre patrimoine personnel et professionnel. Délai de réflexion de <b>7 jours</b> pour renoncer.</p>
<p><b>Conjoint collaborateur</b> : depuis 2022 → durée limitée à <b>5 ans</b>. Au-delà : choix entre salarié ou associé.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Art. L. 121-1 C. com.</b> : commerçant = exerce actes de commerce + profession habituelle</li>
<li><b>Immatriculation RNE</b> : 1 mois avant → 15 jours après</li>
<li><b>Comptes annuels</b> : bilan + compte de résultat + annexes = image fidèle</li>

<li><b>Résidence principale</b> : insaisissable de plein droit (loi Macron 2015)</li>
<li><b>Conjoint collaborateur</b> : depuis 2022 → max 5 ans</li>

{
  id:'2.4', partie:'P2 — Les personnes et les biens', title:'Théorie du patrimoine',
  cours:`<h3>I. Définition et composition du patrimoine</h3>
<p>Le patrimoine est <em>« l'ensemble des biens et des obligations d'une même personne, de l'actif et du passif, envisagé comme formant une universalité de droit »</em> (Vocabulaire Juridique).</p>
<p><b>Actif</b> : biens et droits appréciables en argent. <b>Passif</b> : dettes et obligations appréciables en argent.</p>
<h4>Droits patrimoniaux vs extra-patrimoniaux</h4>
<p><b>Droits patrimoniaux</b> : évaluables en argent. Caractéristiques : <b>cessibles</b>, <b>transmissibles</b>, <b>saisissables</b>, <b>prescriptibles</b>.</p>
<p><b>Droits extra-patrimoniaux</b> : non évaluables en argent (droits familiaux, droits de la personnalité).</p>
<h4>Droits réels vs droits personnels</h4>
<p><b>Droits réels</b> : portent sur un bien. <b>Droits personnels</b> (créance) : droit d'un créancier d'exiger d'un débiteur une prestation.</p>
<h4>Meubles vs immeubles</h4>
<table>
<tr><th>Catégorie</th><th>Sous-catégories</th></tr>
<tr><td><b>Meubles</b></td><td>Par nature (se déplacent), par détermination de la loi (obligations, actions de sociétés)</td></tr>
<tr><td><b>Immeubles</b></td><td>Par nature (fonds, bâtiments), par <b>destination</b> (meubles affectés au fonds), par l'objet</td></tr>
</table>
<h3>II. Les théories du patrimoine</h3>
<h4>A. Théorie classique (Aubry et Rau)</h4>
<p><b>Unicité</b> et <b>indivisibilité</b> : chaque PJ n'a qu'un seul patrimoine. <b>Art. 2284 Code civil</b> : droit de gage général — l'actif répond du passif.</p>
<h4>B. Patrimoine d'affectation</h4>
<p>Manifestations en droit français : statut EI, <b>fiducie</b> (loi 19 février 2007, art. 2011 Code civil), sociétés unipersonnelles.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Actif</b> = biens et droits ; <b>Passif</b> = dettes</li>
<li><b>Droits patrimoniaux</b> : cessibles, transmissibles, saisissables, prescriptibles</li>
<li><b>Immeuble par destination</b> : meuble affecté au service/exploitation d\'un fonds</li>

{

  cours:`<h3>I. Le droit de propriété</h3>
<p><b>Art. 544 du Code civil</b> (inchangé depuis 1804) : <em>« la propriété est le droit de jouir et disposer des choses de la manière la plus absolue, pourvu qu'on n'en fasse pas un usage prohibé par les lois ou par les règlements »</em>.</p>
<h4>Les 3 attributs</h4>
<table>
<tr><th>Attribut</th><th>Définition</th></tr>
<tr><td><b>Usus</b></td><td>Droit d'<b>usage</b> : utiliser ou non la chose</td></tr>
<tr><td><b>Fructus</b></td><td>Droit de <b>jouissance</b> : percevoir les fruits sans altérer la substance</td></tr>
<tr><td><b>Abusus</b></td><td>Droit de <b>disposition</b> : vendre, donner en garantie, détruire</td></tr>
</table>
<h4>Les 3 caractères</h4>
<ul>
<li><b>Absolu</b> : tous les actes souhaités dans les limites légales</li>
<li><b>Perpétuel</b> : transmis aux héritiers, imprescriptible</li>
<li><b>Exclusif</b> : monopole du propriétaire</li>
</ul>
<h3>II. L'usufruit et la nue-propriété</h3>
<p><b>Art. 578</b> : <em>« l'usufruit est le droit de jouir des choses dont un autre a la propriété, comme le propriétaire lui-même, mais à la charge d'en conserver la substance »</em>.</p>
<p><b>Usufruitier</b> = usus + fructus. <b>Nu-propriétaire</b> = abusus.</p>
<p>Obligations du nu-propriétaire : supporter les <b>grosses réparations (art. 606)</b> : gros murs et voûtes, poutres et couvertures entières, digues, murs de soutènement. <b>Liste exhaustive</b>.</p>
<h3>III. Limites du droit de propriété</h3>
<h4>Abus du droit de propriété</h4>
<p>2 conditions cumulatives : <b>intention de nuire</b> + <b>usage d'un droit sans utilité</b>. Sanction : responsabilité extracontractuelle.</p>
<h4>Troubles anormaux du voisinage</h4>
<p>Sanction <b>sans démonstration de faute</b>. Trouble doit être <b>anormal</b> : fréquence + gravité. <b>Exception de pré-occupation</b>.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Art. 544</b> : définition légale du droit de propriété (1804)</li>
<li><b>Usus</b> + <b>Fructus</b> + <b>Abusus</b></li>
<li><b>Art. 578</b> : définition de l\'usufruit</li>

<li><b>Abus de droit</b> : intention de nuire + sans utilité</li>
<li><b>Troubles anormaux de voisinage</b> : sans faute, caractère anormal</li>
</ul></div>`,

{
  id:'3.1', partie:'P3 — L\'entreprise et les contrats', title:'La formation du contrat',
  cours:`<h3>I. Notion de contrat</h3>
<p><b>Art. 1101 du Code civil</b> (Ordonnance du <b>10 février 2016</b>) : <em>« le contrat est un accord de volontés entre deux ou plusieurs personnes destiné à créer, modifier, transmettre ou éteindre des obligations »</em>.</p>
<h4>Classifications</h4>
<table>
<tr><th>Classification</th><th>Types</th></tr>
<tr><td>Nombre de parties</td><td><b>Synallagmatique</b> (obligations réciproques) / <b>Unilatéral</b></td></tr>
<tr><td>Contrepartie</td><td><b>À titre onéreux</b> / <b>À titre gratuit</b></td></tr>
<tr><td>Exécution</td><td><b>Instantané</b> / <b>À exécution successive</b></td></tr>
<tr><td>Négociation</td><td><b>De gré à gré</b> / <b>D'adhésion</b></td></tr>
</table>
<h3>II. Les conditions de validité du contrat (art. 1128)</h3>
<ul>
<li><b>Consentement</b> valable (non vicié)</li>
<li><b>Capacité</b> de contracter</li>
<li>Un <b>contenu licite et certain</b></li>
</ul>
<h4>L'offre</h4>
<p>Doit être <b>ferme</b> et <b>précise</b>. Caducité au décès ou incapacité de l'offrant. Formation du contrat : <b>théorie de la réception</b>.</p>
<h4>Les vices du consentement</h4>
<table>
<tr><th>Vice</th><th>Définition</th><th>Sanction</th></tr>
<tr><td><b>Erreur</b></td><td>Fausse représentation. Doit être <b>excusable</b> + porter sur les <b>qualités essentielles</b>.</td><td>Nullité relative</td></tr>
<tr><td><b>Dol</b></td><td>Manœuvres frauduleuses délibérées. Élément matériel + intentionnel.</td><td>Nullité relative + D&I</td></tr>
<tr><td><b>Violence</b></td><td>Menace d'un dommage grave et imminent. Violence économique admise.</td><td>Nullité relative + D&I</td></tr>
</table>
<h3>III. La période précontractuelle</h3>
<p>Rupture fautive des pourparlers → <b>responsabilité extracontractuelle</b>.</p>
<table>
<tr><th>Type</th><th>Définition</th></tr>
<tr><td><b>Promesse unilatérale</b></td><td>Faculté de conclure accordée au bénéficiaire. Rétractation → D&I.</td></tr>
<tr><td><b>Pacte de préférence</b></td><td>Priorité accordée si vente. Tiers complice peut être substitué.</td></tr>
</table>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Art. 1101</b> : définition du contrat (réforme 10 fév. 2016)</li>
<li><b>Art. 1128</b> : 3 conditions : consentement + capacité + contenu licite</li>
<li><b>Erreur</b> : excusable + qualités essentielles → nullité relative</li>
<li><b>Dol</b> : manœuvres frauduleuses → nullité relative + D&I</li>
<li><b>Violence</b> : menace grave (économique admise) → nullité relative + D&I</li>
<li><b>Rupture pourparlers</b> : responsabilité extracontractuelle si fautive</li>
</ul></div>`,

{
  id:'3.2', partie:'P3 — L\'entreprise et les contrats', title:'Les effets et l\'inexécution du contrat',
  cours:`<h3>I. Les effets du contrat</h3>
<h4>A. Force obligatoire (art. 1103)</h4>
<p><em>« Les contrats légalement formés tiennent lieu de loi à ceux qui les ont faits »</em>. Principe : <b>pacta sunt servanda</b>.</p>
<h4>B. Relativité des contrats (art. 1199)</h4>
<p>Le contrat ne crée d'obligations qu'entre les parties. Exception : <b>stipulation pour autrui</b> (art. 1205) — ex : assurance-vie.</p>
<h4>C. L'imprévision (art. 1195 — réforme 2016)</h4>
<p>Changement imprévisible rendant l'exécution excessivement onéreuse → renégociation. En cas d'échec : le juge adapte ou met fin au contrat.</p>
<h3>II. L'inexécution du contrat</h3>
<h4>A. Exception d'inexécution (art. 1219)</h4>
<p>Refus légitime d'exécuter si l'autre n'exécute pas sa propre obligation.</p>
<h4>B. La résolution</h4>
<p>3 modes : <b>clause résolutoire</b> / <b>résolution unilatérale</b> (risques du créancier) / <b>résolution judiciaire</b>.</p>
<h4>C. La responsabilité contractuelle (art. 1231)</h4>
<p>Conditions : <b>inexécution</b> + <b>préjudice</b> + <b>lien de causalité</b>. Mise en demeure préalable.</p>
<h4>Obligation de moyens vs de résultat</h4>
<p><b>Moyens</b> (médecin) : preuve de la faute sur le créancier. <b>Résultat</b> (transporteur) : simple absence de résultat suffit.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Art. 1103</b> : pacta sunt servanda</li>
<li><b>Art. 1199</b> : relativité des contrats</li>
<li><b>Stipulation pour autrui (art. 1205)</b> : exception</li>
<li><b>Imprévision (art. 1195)</b> : renégociation → juge</li>
<li><b>Resp. contractuelle</b> : inexécution + préjudice + lien de causalité</li>
<li><b>Clause pénale</b> : modifiable par le juge si manifestement excessive/dérisoire</li>

    correction:`Q1 — Mise fin au contrat :

<p>Le fonds de commerce est un <b>bien meuble incorporel</b>, universalité de fait regroupant l'ensemble des biens mobiliers affectés à l'exploitation d'une activité commerciale ou artisanale.</p>
<h4>Éléments composant le fonds de commerce</h4>
<table>
<tr><th>Catégorie</th><th>Éléments</th></tr>
<tr><td><b>Éléments incorporels essentiels</b></td><td><b>Clientèle et achalandage</b> (élément essentiel), nom commercial, enseigne, droit au bail, brevets, marques, dessins, modèles</td></tr>

</table>
<div class="warn-box">⚠️ Le fonds de commerce n'inclut PAS les créances/dettes, ni les immeubles, ni les contrats en cours.</div>
<h3>II. La vente du fonds de commerce</h3>

<p><b>Publicité</b> : JAL dans les <b>15 jours</b> + BODACC dans les <b>3 jours</b>. Oppositions créanciers : <b>10 jours</b>.</p>
<h3>III. Le nantissement du fonds</h3>
<p>Hypothèque sur fonds de commerce. Inscription au <b>RNE</b>. Droit de préférence du créancier nanti.</p>
<h3>IV. Le bail commercial</h3>
<p>Durée minimale : <b>9 ans</b>. Droit au renouvellement. Refus → <b>indemnité d'éviction</b> (sauf faute grave).</p>

  cours:`<h3>I. Notion et fondements</h3>
<p>La responsabilité extracontractuelle naît <b>hors contrat</b>. Fondements : <b>art. 1240</b> (faute), <b>art. 1242</b> (fait d'autrui et des choses), <b>art. 1243</b> (animaux), <b>art. 1244</b> (bâtiments).</p>
<h3>II. La responsabilité du fait personnel (art. 1240)</h3>
<p>Conditions : <b>faute</b> + <b>préjudice</b> + <b>lien de causalité</b>.</p>
<p>Le <b>préjudice</b> doit être : <b>certain</b>, <b>direct</b>, <b>personnel</b>, <b>licite</b>. 3 types : <b>matériel</b>, <b>corporel</b>, <b>moral</b>.</p>
<h3>III. La responsabilité du fait d'autrui (art. 1242)</h3>
<ul>
<li><b>Parents</b> : responsables des dommages causés par leurs enfants mineurs habitant avec eux (de plein droit)</li>
<li><b>Commettants/préposés</b> : l'employeur est responsable de son salarié dans l'exercice de ses fonctions (de plein droit)</li>
<li><b>Instituteurs/artisans</b> : responsables des élèves/apprentis sous leur surveillance</li>
</ul>
<h3>IV. La responsabilité du fait des choses (art. 1242 al. 1)</h3>
<p>Responsabilité du <b>gardien</b> (pouvoir d'<b>usage, direction et contrôle</b>). Présomption de responsabilité.</p>
<h3>V. Les causes d'exonération</h3>
<table>
<tr><th>Cause</th><th>Conditions</th><th>Effet</th></tr>
<tr><td><b>Force majeure</b></td><td>Imprévisible + irrésistible + extérieure</td><td>Exonération totale</td></tr>
<tr><td><b>Fait de la victime</b></td><td>Comportement fautif de la victime</td><td>Totale ou partielle</td></tr>
<tr><td><b>Fait d'un tiers</b></td><td>Comportement fautif d'un tiers</td><td>Totale ou partielle</td></tr>
</table>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Art. 1240</b> : faute + préjudice + lien de causalité</li>
<li><b>Préjudice</b> : certain + direct + personnel + licite</li>

<li><b>Gardien</b> : pouvoir d\'usage, direction et contrôle</li>
<li><b>Force majeure</b> : imprévisible + irrésistible + extérieure</li>

  cours:`<h3>I. Produits défectueux (loi 19 mai 1998, art. 1245 C. civ.)</h3>
<p>Transposition directive européenne <b>25 juillet 1985</b>. S'applique aux produits mis en circulation après le <b>30 mai 1998</b>.</p>
<h4>Conditions</h4>
<ul>
<li><b>Producteur</b> : fabricant, importateur, ou distributeur (si producteur non identifiable sous 3 mois)</li>
<li><b>Défaut de sécurité</b> : le produit n'offre pas la sécurité à laquelle on peut légitimement s'attendre</li>
<li><b>Dommage</b> : mort/blessure + dommage à un bien (> 500 €)</li>
</ul>
<h4>Exonérations</h4>
<ul>
<li><b>Risque de développement</b> : état des connaissances ne permettait pas de déceler le défaut</li>
<li>Défaut inexistant lors de la mise en circulation</li>
</ul>
<p><b>Prescription</b> : 3 ans (connaissance). <b>Forclusion</b> : 10 ans (mise en circulation).</p>
<h3>II. Responsabilité pénale des personnes morales</h3>
<p>PM (sauf État) responsables des infractions commises pour leur compte par leurs <b>organes ou représentants</b>. Amende <b>× 5</b> par rapport aux PP. Autres sanctions : dissolution, interdiction d'activité, fermeture, exclusion des marchés publics.</p>
<h3>III. Responsabilité des dirigeants sociaux</h3>
<p><b>Abus de biens sociaux (ABS)</b> : usage des biens/crédit de la société dans un intérêt personnel. Sanction : <b>5 ans + 375 000 €</b>.</p>
<h3>IV. Responsabilité administrative</h3>
<ul>
<li><b>Faute de service</b> : le service public fonctionne mal → collectivité responsable → Tribunal administratif</li>
<li><b>Faute personnelle</b> : acte détachable du service, intérêt personnel → fonctionnaire responsable → Tribunal judiciaire</li>
</ul>

{
  id:'1.1', partie:'P1 — Introduction', title:'Définition et rôle de la comptabilité',
  cours:`<h3>I. Définition de la comptabilité</h3>
<div class="quote"><b>PCG, article 120.1 :</b> <em>« La comptabilité est un système d'organisation de l'information financière permettant de saisir, classer, enregistrer des données de base chiffrées et présenter des états reflétant une image fidèle du patrimoine, de la situation financière et du résultat de l'entité à la date de clôture. »</em></div>
<p>La comptabilité, c'est donc trois choses :</p>
<ul>
<li><b>Un système d'organisation</b> de l'information financière</li>
<li><b>Un traitement</b> de l'information</li>
<li><b>Une représentation</b> de la réalité</li>
</ul>
<p>Toute cette procédure est effectuée en respectant des procédures et des règles très précises. Néanmoins, l'interprétation garde une place importante : il y a une part de subjectivité. L'<b>audit</b> (interne et/ou externe) garantit le maximum d'objectivité et de fidélité des comptes.</p>
<h4>Les types de comptabilité</h4>
<ul>
<li><b>Comptabilité financière</b> : présente le patrimoine, la situation financière et le résultat</li>
<li><b>Comptabilité de gestion</b> (analytique) : centrée sur le calcul et l'analyse des coûts</li>
<li><b>Comptabilité budgétaire</b> : établissement et suivi d'un budget (recettes/dépenses)</li>
<li><b>Comptabilité publique</b> : règles spécifiques aux entités publiques, tendant à se rapprocher de la comptabilité privée</li>
</ul>
<h3>II. Les 4 fonctions et rôles de la comptabilité</h3>
<table>
<tr><th>Rôle</th><th>Explication</th></tr>
<tr><td><b>Moyen de preuve</b></td><td>En cas de litige (Code de commerce, art. L123-23). La comptabilité est admise comme preuve en justice.</td></tr>
<tr><td><b>Instrument de contrôle</b></td><td>Contrôle des propriétaires sur les gestionnaires, du CE, du Trésor public (base du résultat fiscal).</td></tr>
<tr><td><b>Aide à la décision</b></td><td>En interne (prix, investissements) et en externe (banquiers, investisseurs, fournisseurs, clients).</td></tr>
<tr><td><b>Rôle social</b></td><td>Base des statistiques nationales, dialogue social, partage de la valeur ajoutée.</td></tr>
</table>
<h3>III. Les relations comptabilité / économie</h3>
<table>
<tr><th>Marché économique</th><th>Opérations comptables</th></tr>
<tr><td>Marché des biens et services</td><td>Achats, ventes, production, commercialisation</td></tr>
<tr><td>Marché du travail</td><td>Rémunération, paie, indemnités</td></tr>
<tr><td>Marché des capitaux</td><td>Augmentation de capital, emprunts</td></tr>
<tr><td>Marché financier</td><td>Gestion de portefeuille de titres</td></tr>
</table>
<h3>IV. Les sources du droit comptable</h3>
<ul>
<li><b>Code de commerce</b> : art. L123-12 à L123-28 (règles applicables à tous les commerçants)</li>
<li><b>ANC</b> (Autorité des Normes Comptables) : remplace depuis 2009 le CRC + CNC</li>
<li><b>PCG</b> (Plan Comptable Général) : ensemble des règles et principes comptables français</li>
<li><b>Jurisprudence et doctrine</b> : avis, recommandations de l'ANC, OEC, CNCC, AMF</li>
<li><b>Sources européennes</b> : directives et règlements UE</li>
<li><b>Sources internationales</b> : normes IAS/IFRS de l'IASB</li>
</ul>
<h3>V. Les principes comptables fondamentaux</h3>
<table>
<tr><th>Principe</th><th>Définition</th></tr>
<tr><td><b>Image fidèle</b></td><td>Les comptes doivent refléter la réalité du patrimoine et du résultat</td></tr>
<tr><td><b>Permanence des méthodes</b></td><td>Les méthodes ne changent pas d'un exercice à l'autre (sauf justification en annexe)</td></tr>
<tr><td><b>Continuité d'exploitation</b></td><td>L'entreprise est présumée continuer son activité</td></tr>
<tr><td><b>Prudence</b></td><td>Risques et pertes pris en compte dès leur connaissance</td></tr>
<tr><td><b>Indépendance des exercices</b></td><td>Charges et produits rattachés à l'exercice auquel ils appartiennent</td></tr>
<tr><td><b>Coût historique</b></td><td>Actifs évalués au coût d'acquisition ou de production initial</td></tr>
<tr><td><b>Non compensation</b></td><td>Pas de compensation actif/passif ou charges/produits</td></tr>
<tr><td><b>Intangibilité du bilan d'ouverture</b></td><td>Bilan d'ouverture = bilan de clôture de l'exercice précédent</td></tr>
</table>

    contexte:'M. JYCROIS a créé son entreprise il y a 10 ans. Son fonds de commerce a beaucoup de valeur. Il souhaite faire apparaître cette augmentation dans son bilan. Par ailleurs, il a payé une prime d\'assurance annuelle qui couvre à la fois l\'exercice qui se termine et celui qui commence.',
    questions:['<b>Q1</b> : M. JYCROIS peut-il augmenter la valeur du fonds de commerce dans son bilan ? Quel principe comptable est en jeu ?','<b>Q2</b> : Comment traiter la prime d\'assurance qui couvre deux exercices ? Quel principe s\'applique ?'],
    correction:`Q1 — Réévaluation du fonds de commerce :
NON. Le principe du COÛT HISTORIQUE (art. L123-18 Code de commerce) impose d'évaluer les actifs à leur coût d'acquisition initial. M. JYCROIS ne peut pas réévaluer son fonds de commerce à sa valeur de marché actuelle, même si elle a augmenté. Une réévaluation libre n'est admise que dans des conditions très strictes prévues par la loi (réévaluation légale). Inscrire une valeur supérieure au coût historique serait contraire au principe de prudence et ferait apparaître un bénéfice non réalisé.

Q2 — Prime d'assurance sur deux exercices :
Le principe d'INDÉPENDANCE DES EXERCICES (séparation) impose de rattacher les charges à l'exercice auquel elles se rapportent. La partie de la prime qui concerne l'exercice suivant doit être comptabilisée en CHARGE CONSTATÉE D'AVANCE (compte 486), et non en charge de l'exercice en cours. Ainsi :
- La portion concernant l'exercice N → charge de l'exercice N (compte 616 Primes d'assurance)
- La portion concernant l'exercice N+1 → charge constatée d'avance (actif du bilan)
Cette régularisation est obligatoire pour donner une image fidèle du résultat.`

  cours:`<h3>I. Les flux et les stocks</h3>
<h4>Types de flux</h4>
<ul>
<li><b>Flux physiques/réels</b> : échange physique de biens ou de services (livraison de marchandises)</li>
<li><b>Flux monétaires</b> : contrepartie financière d\'échanges physiques (paiement)</li>
<li><b>Flux financiers</b> : entrée/sortie d\'argent sans contrepartie physique (emprunt)</li>
<li><b>Flux internes</b> : sans le concours d\'un tiers (prêt entre deux établissements d\'un même groupe)</li>
<li><b>Flux externes</b> : avec le concours d\'un tiers (paiement fournisseur, salariés…)</li>
</ul>
<div class="formula-box">En comptabilité :
→ FLUX = mouvement sur le compte (débit ou crédit)
→ STOCK = montant (solde) du compte à un instant donné</div>
<h3>II. Le bilan</h3>
<p>Le terme vient de l\'italien <em>bilanciare</em> : « peser, mettre en équilibre ». Le bilan est une <b>photographie à un instant donné</b> de la situation patrimoniale de l\'entreprise : équilibre entre les actifs (emplois) et les passifs (ressources).</p>
<table>
<tr><th>ACTIF (emplois) — liquidité croissante</th><th>PASSIF (ressources) — exigibilité croissante</th></tr>
<tr><td><b>Actif immobilisé :</b><br>• Immo incorporelles (classe 2)<br>• Immo corporelles (classe 2)<br>• Immo financières (classe 2)</td><td><b>Capitaux propres :</b><br>• Capital (101)<br>• Réserves<br>• Résultat de l\'exercice</td></tr>
<tr><td><b>Actif circulant :</b><br>• Stocks et en-cours (classe 3)<br>• Créances clients (classe 4)<br>• VMP (classe 5)<br>• Disponibilités (classe 5)</td><td><b>Dettes :</b><br>• Dettes financières (164…)<br>• Dettes d\'exploitation (401, 421…)<br>• Dettes diverses (classe 4)</td></tr>
</table>
<h3>III. Le compte de résultat</h3>
<p>Confronte les <b>charges</b> (classe 6) et les <b>produits</b> (classe 7) de l\'exercice. La différence donne le <b>résultat</b> :</p>
<div class="formula-box">Résultat = Produits (classe 7) − Charges (classe 6)
- Bénéfice → compte 120 (actif du bilan, ressource)
- Perte → compte 129 (actif du bilan, emploi négatif)</div>
<h3>IV. L\'annexe</h3>
<p>L\'annexe <b>complète et commente</b> l\'information donnée par le bilan et le compte de résultat. Elle est <b>obligatoire</b>.</p>
<h3>V. Le processus comptable</h3>
<div class="formula-box">Pièces justificatives
  → Journal (enregistrement chronologique)
  → Grand livre (par compte)
  → Balance
  → États financiers (bilan, compte de résultat, annexe)</div>
<h3>VI. Les classes de comptes du PCG</h3>
<table>
<tr><th>Classe</th><th>Contenu</th><th>Bilan ou Résultat</th></tr>
<tr><td>1</td><td>Capitaux (capital, réserves, emprunts…)</td><td>Bilan — Passif</td></tr>
<tr><td>2</td><td>Immobilisations</td><td>Bilan — Actif</td></tr>
<tr><td>3</td><td>Stocks et en-cours</td><td>Bilan — Actif</td></tr>
<tr><td>4</td><td>Comptes de tiers (clients, fournisseurs, État…)</td><td>Bilan (Actif ou Passif)</td></tr>
<tr><td>5</td><td>Comptes financiers (banque, caisse, VMP…)</td><td>Bilan — Actif</td></tr>
<tr><td>6</td><td>Charges</td><td>Compte de résultat</td></tr>
<tr><td>7</td><td>Produits</td><td>Compte de résultat</td></tr>
</table>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Bilan</b> = photographie à date ; Actif = emplois ; Passif = ressources</li>
<li><b>Compte de résultat</b> : Produits (cl. 7) − Charges (cl. 6) = Résultat</li>
<li><b>Annexe</b> = obligatoire, complète et commente bilan + compte de résultat</li>
<li><b>4 classes</b> de comptes de bilan (1 à 5) + <b>2 classes</b> de gestion (6 et 7)</li>
<li><b>Flux</b> = mouvement ; <b>Stock</b> = solde du compte</li>
</ul></div>`,

{
  id:'2.2', partie:'P2 — Méthode comptable', title:'La partie double et les comptes en T',
  cours:`<h3>I. Le principe de la partie double</h3>
<p>Formalisé par <b>Luca Pacioli</b> en 1494. Principe fondamental : <em>« toute opération affecte au moins deux comptes, pour un même montant total en débit et en crédit »</em>.</p>
<div class="formula-box">TOTAL DES DÉBITS = TOTAL DES CRÉDITS (dans chaque écriture)</div>
<h3>II. Fonctionnement des comptes</h3>
<p>Un compte est un <b>tableau en T</b> où sont enregistrés les flux relatifs à un type d\'opération :</p>
<table>
<tr><th>Type de compte</th><th>Augmente par</th><th>Diminue par</th><th>Solde normal</th></tr>
<tr><td><b>Actif</b> (cl. 1–5 côté gauche)</td><td>Débit</td><td>Crédit</td><td>Débiteur</td></tr>
<tr><td><b>Passif</b> (cl. 1–5 côté droit)</td><td>Crédit</td><td>Débit</td><td>Créditeur</td></tr>
<tr><td><b>Charges</b> (cl. 6)</td><td>Débit</td><td>Crédit</td><td>Débiteur</td></tr>
<tr><td><b>Produits</b> (cl. 7)</td><td>Crédit</td><td>Débit</td><td>Créditeur</td></tr>
</table>
<div class="warn-box">⚠️ Méthode : avant toute écriture, se poser 3 questions :<br>1) Quels sont les comptes concernés ?<br>2) Sont-ce des comptes d\'actif/passif/charges/produits ?<br>3) Augmentent-ils ou diminuent-ils ?</div>
<h3>III. Le livre-journal</h3>
<p>Les écritures comptables sont enregistrées dans le livre-journal en <b>ordre chronologique</b>. Format obligatoire :</p>
<div class="formula-box">Date / N° pièce
  N° et intitulé du compte débité        Montant
    N° et intitulé du compte crédité              Montant
  Libellé de l'opération
  ──────────────────────────────</div>
<h4>Exemple : Acquisition d\'un terrain payé par chèque 45 000 €</h4>
<table class="compta-table">
<tr><th>Débit</th><th>N° compte</th><th>Intitulé</th><th>Crédit</th></tr>
<tr><td class="debit">45 000</td><td>211</td><td>Terrains</td><td></td></tr>
<tr><td></td><td>512</td><td>Banque</td><td class="credit">45 000</td></tr>
</table>
<p><em>Analyse : Le terrain (actif) augmente → débit. La banque (actif) diminue → crédit.</em></p>
<h3>IV. Calcul du solde d\'un compte</h3>
<div class="formula-box">Solde débiteur  : si Total Débits > Total Crédits → inscrit du côté crédit pour équilibrer
Solde créditeur : si Total Crédits > Total Débits → inscrit du côté débit pour équilibrer</div>
<h3>V. De la balance aux états financiers</h3>
<p>En fin d\'exercice : <b>Balance avant inventaire → Inventaire physique → Écritures d\'inventaire → Balance après inventaire → Comptes annuels → Clôture des comptes</b>.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Actif/charges</b> : augmente au débit, diminue au crédit</li>
<li><b>Passif/produits</b> : augmente au crédit, diminue au débit</li>
<li><b>Journal</b> : ordre chronologique ; <b>Grand livre</b> : par compte</li>
<li><b>Balance</b> : Total débits = Total crédits (contrôle arithmétique)</li>
<li>Une écriture : au moins un compte de bilan OU un compte bilan + un compte de gestion</li>
</ul></div>`,

  id:'2.3', partie:'P2 — Méthode comptable', title:'Actif, passif, charges, produits',
  cours:`<h3>I. Définition d\'un actif</h3>
<p>Un actif est un élément du patrimoine qui réunit <b>3 critères</b> :</p>
<ul>
<li><b>Identifiable</b> : peut être séparé de l\'entité (vendu, loué) ou résulte d\'un droit légal/contractuel</li>
<li><b>Contrôlable</b> : l\'entreprise maîtrise les avantages économiques et supporte les risques</li>
<li><b>Porteur d\'avantages économiques futurs</b> : potentiel de production, conversion en trésorerie ou réduction des sorties</li>
</ul>
<p>Pour être <b>comptabilisé</b> (PCG art. 212-1) : probabilité d\'avantages économiques futurs + évaluation fiable.</p>
<h4>7 types d\'actifs</h4>
<ul>
<li><b>Immobilisations incorporelles</b> (brevets, fonds commercial, logiciels...)</li>
<li><b>Immobilisations corporelles</b> (terrains, bâtiments, matériel...)</li>
<li><b>Immobilisations financières</b> (titres de participation, prêts...)</li>
<li><b>Stocks</b> (marchandises, matières premières, produits finis...)</li>
<li><b>Créances</b> (clients, État, autres...)</li>
<li><b>Disponibilités</b> (banque, caisse, VMP)</li>
<li><b>Charges constatées d\'avance</b> (charges payées mais relatives à l\'exercice suivant)</li>
</ul>
<h3>II. Définition d\'un passif</h3>
<p>Un passif est un élément ayant une <b>valeur économique négative</b> : obligation envers un tiers probable ou certaine qui provoquera une sortie de ressources sans contrepartie équivalente.</p>
<div class="formula-box">Passif = Dettes + Provisions + Capitaux propres (capital + réserves + bénéfices)</div>
<h3>III. Définition d\'une charge</h3>
<p>Une charge est un <b>emploi définitif</b> correspondant à un appauvrissement de l\'entreprise.</p>
<div class="warn-box">⚠️ Charges ≠ Dépenses : décalage possible avec le paiement effectif. Certaines charges sont calculées et jamais décaissées (dotations aux amortissements, dotations aux provisions).</div>
<h4>Charges non décaissées (calculées)</h4>
<ul>
<li>Variations de stocks des biens achetés</li>
<li>Dotations aux amortissements, aux provisions, aux dépréciations</li>
<li>VNC (valeur nette comptable) des éléments cédés</li>
</ul>
<h4>Typologie</h4>
<ul>
<li>Charges d\'exploitation (cl. 60-65)</li>
<li>Charges financières (cl. 66)</li>
<li>Charges exceptionnelles (cl. 67)</li>
<li>Participation des salariés + IS (cl. 69)</li>
</ul>
<h3>IV. Définition d\'un produit</h3>
<p>Un produit est une <b>ressource interne</b> correspondant à un enrichissement de l\'entreprise.</p>
<div class="warn-box">⚠️ Produits ≠ Recettes : une vente à crédit est un produit dès la livraison, même si le paiement n\'est pas encore reçu.</div>
<h4>Produits calculés (non encaissés)</h4>
<ul>
<li>Variations de stocks de biens produits</li>
<li>Reprises sur amortissements, provisions, dépréciations</li>
<li>Transferts de charges</li>
</ul>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Actif</b> = identifiable + contrôlable + avantages économiques futurs</li>
<li><b>Passif</b> = dettes + provisions + capitaux propres</li>
<li><b>Charges ≠ Dépenses</b> (décalage temporel possible)</li>
<li><b>Produits ≠ Recettes</b> (décalage temporel possible)</li>
<li>Ce qui ne répond pas à la définition d\'actif → charge (sauf éléments non significatifs)</li>
<li><b>Charges constatées d\'avance</b> = actif (pas une charge de l\'exercice en cours)</li>
</ul></div>`,

{
  id:'3.1', partie:'P3 — Opérations courantes', title:'Enregistrement d\'une facture (de doit)',
  cours:`<h3>I. La TVA — Mécanisme général</h3>
<p>La TVA est la principale ressource fiscale de l\'État. Elle est supportée par le <b>consommateur final</b>. Les entreprises ne sont que des <b>collecteurs</b> pour le compte du Trésor public.</p>
<div class="formula-box">TVA à payer = TVA collectée (sur ventes) − TVA déductible (sur achats)</div>
<p>Principaux taux en France : <b>20 %</b> (taux normal), <b>10 %</b> (taux intermédiaire), <b>5,5 %</b> (taux réduit), <b>2,1 %</b> (taux super-réduit).</p>
<h4>Passage HT ↔ TTC</h4>
<div class="formula-box">TTC = HT × (1 + taux TVA)
HT  = TTC / (1 + taux TVA)
TVA = HT × taux  OU  TVA = TTC − HT</div>
<h3>II. Les réductions commerciales (RRR)</h3>
<ul>
<li><b>Remise</b> : accordée habituellement selon l\'importance de la vente ou la qualité du client</li>
<li><b>Rabais</b> : accordé exceptionnellement pour un défaut, un retard, une non-conformité</li>
<li><b>Ristourne</b> : accordée périodiquement selon le CA réalisé sur une période</li>
</ul>
<div class="danger-box">⛔ Règle fondamentale : Les RRR sur facture de DOIT ne donnent lieu à AUCUN enregistrement spécifique. On enregistre directement le <b>net commercial</b>.</div>
<h3>III. L\'escompte de règlement (réduction financière)</h3>
<p>L\'escompte est lié aux <b>conditions de paiement</b> (paiement anticipé). Il est <b>toujours enregistré séparément</b>, contrairement aux RRR.</p>
<h3>IV. Chaîne de calcul d\'une facture</h3>
<div class="formula-box">Prix brut HT
− Réductions commerciales (RRR) = Net commercial HT
− Escompte (réduction financière) = Net financier HT
× (1 + taux TVA)                = Montant TTC (net à payer)

Note : la TVA est calculée sur le NET FINANCIER</div>
<h3>V. Enregistrements comptables</h3>
<h4>Chez le FOURNISSEUR (vendeur) — facture de vente</h4>
<table class="compta-table">
<tr><th>Débit</th><th>N°</th><th>Intitulé</th><th>Crédit</th></tr>
<tr><td class="debit">TTC</td><td>411</td><td>Clients</td><td></td></tr>
<tr><td></td><td>707</td><td>Ventes de marchandises (net commercial)</td><td class="credit">Net com.</td></tr>
<tr><td></td><td>44571</td><td>État, TVA collectée</td><td class="credit">TVA</td></tr>
</table>
<h4>Chez le CLIENT (acheteur) — facture d\'achat</h4>
<table class="compta-table">
<tr><th>Débit</th><th>N°</th><th>Intitulé</th><th>Crédit</th></tr>
<tr><td class="debit">Net com.</td><td>607</td><td>Achats de marchandises</td><td></td></tr>
<tr><td class="debit">TVA</td><td>44566</td><td>État, TVA déductible</td><td></td></tr>
<tr><td></td><td>401</td><td>Fournisseurs</td><td class="credit">TTC</td></tr>
</table>
<h4>Avec escompte (réduction financière)</h4>
<table class="compta-table">
<tr><th>Débit</th><th>N°</th><th>Intitulé</th><th>Crédit</th></tr>
<tr><td class="debit">TTC</td><td>411</td><td>Clients</td><td></td></tr>
<tr><td class="debit">Escompte</td><td>665</td><td>Escomptes accordés (chez fournisseur)</td><td></td></tr>
<tr><td></td><td>707</td><td>Ventes (net commercial)</td><td class="credit">Net com.</td></tr>
<tr><td></td><td>44571</td><td>TVA collectée (sur net financier)</td><td class="credit">TVA</td></tr>
</table>
<p>Chez le client : <b>765 Escomptes obtenus</b> au crédit.</p>
<h4>Comptes d\'achats à connaître</h4>
<ul>
<li><b>601</b> Achats stockés — matières premières</li>
<li><b>606</b> Achats non stockés (fournitures, énergie)</li>
<li><b>607</b> Achats de marchandises</li>
<li><b>701</b> Ventes de produits finis</li>
<li><b>706</b> Prestations de services</li>
<li><b>707</b> Ventes de marchandises</li>
</ul>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>RRR sur facture de doit</b> → pas d\'écriture séparée, enregistrement au net commercial</li>
<li><b>Escompte</b> → toujours enregistré (665 accordés / 765 obtenus)</li>
<li><b>TVA collectée</b> = 44571 (fournisseur) ; <b>TVA déductible</b> = 44566 (client)</li>
<li>Ordre de calcul : Brut → −RRR = Net commercial → −Escompte = Net financier → ×(1+TVA) = TTC</li>
<li><b>TVA calculée sur le net financier</b> (pas sur le net commercial)</li>
</ul></div>`,

    titre: "Facture d'avoir",

    cours: `<h3>La facture d'avoir</h3>

<h4>2. RRR sur avoir</h4>

   '4.1': {
    titre: 'La TVA',
    partie: 'IV',
    cours: `<h3>Mécanisme général</h3>
<p><b>TVA à payer = TVA collectée − TVA déductible.</b> L'entreprise n'est qu'un collecteur d'impôt ; la TVA n'est pas une charge.</p>
<h3>Coefficient de déduction</h3>
<p>Coeff. déduction = coeff. d'assujettissement × coeff. de taxation × coeff. d'admission.<br>
TVA déductible = TVA facturée × coefficient de déduction.</p>
<ul>
  <li><b>Véhicules de tourisme</b> : coeff. d'admission = 0 (TVA non déductible).</li>
  <li><b>Gazole véhicule tourisme</b> : 80 %. Utilitaire : 100 %. GPL/GNV/Électricité : 100 %.</li>
</ul>
<h3>Fait générateur vs Exigibilité</h3>
<table style="width:100%;border-collapse:collapse;font-size:.85em;border:1px solid #ccc">
<tr style="background:#f0f0f0"><th style="padding:4px;border:1px solid #ccc">Type d'opération</th><th style="padding:4px;border:1px solid #ccc">Fait générateur</th><th style="padding:4px;border:1px solid #ccc">Exigibilité</th></tr>
<tr><td style="padding:4px;border:1px solid #ccc">Livraison de biens</td><td style="padding:4px;border:1px solid #ccc">Livraison</td><td style="padding:4px;border:1px solid #ccc">Livraison (simultané)</td></tr>
<tr><td style="padding:4px;border:1px solid #ccc">Prestations de services</td><td style="padding:4px;border:1px solid #ccc">Exécution</td><td style="padding:4px;border:1px solid #ccc">Encaissement (sauf option débits)</td></tr>
</table>
<h3>Liquidation (régime réel normal)</h3>
<p>Chaque mois : TVA collectée − TVA déd. immo − TVA déd. B&S = TVA à décaisser (compte 44551).<br>
Si résultat négatif → <b>crédit de TVA (44567)</b>, reportable ou remboursable.</p>
<h3>TVA intracommunautaire</h3>
<p>Acquisitions : auto-liquidation. L'acheteur français enregistre simultanément <b>4452 TVA due intracommunautaire</b> (dette) et <b>44566(2) TVA déductible</b> (créance). Livraisons : exonérées (comme les exportations).</p>`,
