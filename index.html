//  LOGIQUE HUB
// ═══════════════════════════════════════════════════════

let currentSubject = 'droit';
let currentCh = null; // Contiendra l'index numérique du chapitre dans le tableau
let currentMode = 'cours';
let flashIdx = 0;

// Surcouche pour rendre l'affichage résilient aux variations de clés dans vos objets
function getSafeData(ch) {
  return {
    id: ch.id || "",
    partie: ch.partie || "",
    title: ch.title || ch.titre || "Sans titre",
    cours: ch.cours || "Aucun cours disponible.",
    vocab: ch.vocab || ch.vocabulaire || [],
    flash: ch.flashcards || ch.flash || [],
    qcm: ch.qcm || [],
    cas: ch.cas || null
  };
}

function changeSubject(val) {
  currentSubject = val;
  document.body.className = 'theme-' + val;
  currentCh = null;
  flashIdx = 0;
  buildNav();
  document.getElementById('chapter-title').textContent = val === 'droit' ? 'DCG Droit' : 'DCG Comptabilité';
  renderWelcome();
}

function getChapters() {
  return currentSubject === 'droit' ? DROIT_CHAPTERS : COMPTA_CHAPTERS;
}

function buildNav() {
  const chapters = getChapters();
  const nav = document.getElementById('nav-list');
  if (!nav) return;
  
  const parts = {};
  chapters.forEach((ch, index) => {
    const safeCh = getSafeData(ch);
    if (!parts[safeCh.partie]) parts[safeCh.partie] = [];
    parts[safeCh.partie].push({ index, ...safeCh });
  });
  
  let html = '';
  Object.entries(parts).sort().forEach(([part, chs]) => {
    html += `<div class="nav-part-header">${part}</div>`;
    chs.forEach(ch => {
      html += `<div class="nav-item" id="nav-${ch.index}" onclick="loadChapter(${ch.index})">${ch.id} — ${ch.title}</div>`;
    });
  });
  nav.innerHTML = html;
}

function loadChapter(index) {
  currentCh = index;
  flashIdx = 0;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + index);
  if (navEl) navEl.classList.add('active');
  
  const ch = getSafeData(getChapters()[index]);
  document.getElementById('chapter-title').textContent = ch.id + ' — ' + ch.title;
  renderMode(currentMode);
  closeSidebar();
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn, .mob-mode-btn').forEach(btn => {
    const clickAttr = btn.getAttribute('onclick') || "";
    btn.classList.toggle('active', clickAttr.includes(`'${mode}'`));
  });
  currentCh !== null ? renderMode(mode) : renderWelcome();
}

function renderMode(mode) {
  if (currentCh === null) { renderWelcome(); return; }
  const ch = getSafeData(getChapters()[currentCh]);
  switch (mode) {
    case 'cours': renderCours(ch); break;
    case 'vocab': renderVocab(ch); break;
    case 'flash': renderFlash(ch); break;
    case 'qcm':   renderQCM(ch);   break;
    case 'cas':   renderCas(ch);   break;
  }
}

function renderCours(ch) {
  document.getElementById('content').innerHTML = `<div class="cours-body">${ch.cours}</div>`;
}

function renderVocab(ch) {
  if (ch.vocab.length === 0) { document.getElementById('content').innerHTML = "Aucun vocabulaire pour ce chapitre."; return; }
  let html = '<div class="vocab-list">';
  ch.vocab.forEach((item, i) => {
    const terme = item.terme || item.t || "Terme";
    const def = item.def || item.d || "Définition";
    html += `<div class="vocab-card" onclick="toggleVocab(${i})">
      <div class="vocab-term">
        <span>${terme}</span><span class="vocab-arrow" id="varr-${i}">▶</span>
      </div>
      <div class="vocab-def" id="vdef-${i}">${def}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function toggleVocab(i) {
  const def = document.getElementById('vdef-' + i);
  const arr = document.getElementById('varr-' + i);
  if (def) {
    const open = def.style.display === 'block';
    def.style.display = open ? 'none' : 'block';
    if (arr) arr.textContent = open ? '▶' : '▼';
  }
}

function renderFlash(ch) {
  if (ch.flash.length === 0) { document.getElementById('content').innerHTML = "Aucune flashcard pour ce chapitre."; return; }
  const total = ch.flash.length;
  if (flashIdx >= total) flashIdx = 0;
  const card = ch.flash[flashIdx];
  
  const question = card.q || "";
  const reponse = card.a || card.r || "";

  document.getElementById('content').innerHTML = `
    <div class="flash-wrap">
      <div class="flash-counter">${flashIdx + 1} / ${total}</div>
      <div class="flash-card" id="flash-card" onclick="flipCard()">
        <div class="flash-face">
          <p id="flash-text">${question}</p>
          <small style="opacity:.5; display:block; margin-top:20px;">Cliquez pour retourner</small>
        </div>
      </div>
      <div class="flash-controls">
        <button onclick="flashNav(-1)" ${flashIdx === 0 ? 'disabled' : ''}>◀ Préc.</button>
        <button onclick="flashNav(1)" ${flashIdx === total - 1 ? 'disabled' : ''}>Suiv. ▶</button>
      </div>
    </div>`;
  window.currentResponse = reponse;
  window.currentQuestion = question;
  window.isFlipped = false;
}

function flipCard() {
  const textEl = document.getElementById('flash-text');
  if (!textEl) return;
  window.isFlipped = !window.isFlipped;
  textEl.innerHTML = window.isFlipped ? window.currentResponse : window.currentQuestion;
}

function flashNav(dir) {
  const ch = getSafeData(getChapters()[currentCh]);
  flashIdx = Math.max(0, Math.min(ch.flash.length - 1, flashIdx + dir));
  renderFlash(ch);
}

function renderQCM(ch) {
  if (ch.qcm.length === 0) { document.getElementById('content').innerHTML = "Aucun QCM pour ce chapitre."; return; }
  let html = '<div class="qcm-wrap">';
  ch.qcm.forEach((q, qi) => {
    html += `<div class="qcm-block" id="qblock-${qi}">
      <div class="qcm-q"><b>Q${qi + 1}.</b> ${q.q}</div>
      <div class="qcm-opts">`;
    q.opts.forEach((opt, oi) => {
      const correctIndex = q.correct !== undefined ? q.correct : q.ans;
      html += `<button class="qcm-opt" id="opt-${qi}-${oi}" onclick="answerQCM(${qi},${oi},${correctIndex})">${opt}</button>`;
    });
    html += `</div></div>`;
  });
  html += `<div style="margin-top:1.2rem">
    <button onclick="resetQCM()" class="btn-secondary">🔄 Recommencer</button>
  </div></div>`;
  document.getElementById('content').innerHTML = html;
}

function answerQCM(qi, oi, correct) {
  document.querySelectorAll(`#qblock-${qi} .qcm-opt`).forEach((el, i) => {
    el.disabled = true;
    if (i === correct) el.classList.add('correct');
    else if (i === oi) el.classList.add('wrong');
  });
}

function resetQCM() {
  renderQCM(getSafeData(getChapters()[currentCh]));
}

function renderCas(ch) {
  if (!ch.cas) { document.getElementById('content').innerHTML = "Aucun cas pratique pour ce chapitre."; return; }
  let qHtml = (ch.cas.questions || []).map(q => `<div class="cas-question">${q}</div>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="cas-wrap">
      <div class="cas-contexte">${ch.cas.contexte}</div>
      ${qHtml}
      <div style="margin-top:1rem">
        <button onclick="toggleCorr()" class="btn-secondary" id="corr-btn">📋 Voir la correction</button>
      </div>
      <div class="cas-correction" id="cas-corr" style="display:none;">
        <pre>${ch.cas.correction}</pre>
      </div>
    </div>`;
}

function toggleCorr() {
  const el = document.getElementById('cas-corr');
  const btn = document.getElementById('corr-btn');
  if (el && btn) {
    const open = el.style.display === 'block';
    el.style.display = open ? 'none' : 'block';
    btn.textContent = open ? '📋 Voir la correction' : '🙈 Masquer la correction';
  }
}

function renderWelcome() {
  const total = getChapters().length;
  const label = currentSubject === 'droit' ? '⚖️ DCG Droit' : '📊 DCG Comptabilité';
  document.getElementById('content').innerHTML = `
    <div class="welcome-screen">
      <div class="welcome-icon">${currentSubject === 'droit' ? '⚖️' : '📊'}</div>
      <h2>${label}</h2>
      <p>${total} chapitres disponibles — cours, vocabulaire, flashcards, QCM et cas pratiques.</p>
      <p style="opacity:.6;font-size:.9em; margin-top:10px;">Sélectionnez un chapitre dans le menu de gauche pour commencer.</p>
    </div>`;
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  if (sb) {
    const open = sb.classList.toggle('open');
    if (ov) ov.style.display = open ? 'block' : 'none';
  }
}

function closeSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  if (sb) sb.classList.remove('open');
  if (ov) ov.style.display = 'none';
}

(function injectQCMStyles() {
  const s = document.createElement('style');
  s.textContent = `
    .qcm-opt.correct { background: #d1fae5 !important; border-color: #10b981 !important; color: #065f46 !important; }
    .qcm-opt.wrong   { background: #fee2e2 !important; border-color: #ef4444 !important; color: #7f1d1d !important; }
    .cas-correction { margin-top:1rem; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 8px; }
    .vocab-def { display:none; padding:.5rem .75rem; background:rgba(255,255,255,0.05); border-radius:6px; margin-top:.3rem; font-size:.9em; }
    .welcome-screen { text-align:center; padding:3rem 1rem; }
    .welcome-icon { font-size:3rem; margin-bottom:1rem; }
  `;
  document.head.appendChild(s);
})();

// Lancement au démarrage de la page
buildNav();
renderWelcome();
</script>
