<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCG1 — Droit | Révisions complètes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN SYSTEM
   ============================================================ */
:root {
  --bg:        #0f0f14;
  --bg2:       #161620;
  --bg3:       #1e1e2e;
  --border:    #2a2a3e;
  --border2:   #363650;
  --accent:    #6c63ff;
  --accent2:   #a78bfa;
  --gold:      #f0c040;
  --green:     #4ade80;
  --red:       #f87171;
  --orange:    #fb923c;
  --text:      #e8e8f0;
  --text-dim:  #8888aa;
  --text-mute: #555570;
  --radius:    10px;
  --shadow:    0 4px 24px rgba(0,0,0,.45);
  --sidebar-w: 280px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ============================================================
   TOPBAR
   ============================================================ */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 56px;
  background: rgba(15,15,20,.92);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  padding: 0 18px;
}

#hamburger {
  background: none; border: none; cursor: pointer;
  color: var(--text-dim); font-size: 22px;
  display: none;
  padding: 4px;
}

.brand {
  font-family: 'Playfair Display', serif;
  font-size: 19px;
  color: var(--text);
  letter-spacing: -.01em;
}
.brand span { color: var(--accent2); }

.mode-bar {
  display: flex; gap: 4px;
  margin-left: auto;
}
.mode-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--text-dim);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  padding: 5px 11px;
  border-radius: 20px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.mode-btn:hover { color: var(--text); background: var(--bg3); }
.mode-btn.active {
  color: var(--accent2);
  background: rgba(108,99,255,.15);
  border-color: rgba(108,99,255,.4);
}

#chapter-title-bar {
  font-size: 13px; color: var(--text-dim);
  max-width: 220px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}

/* ============================================================
   LAYOUT
   ============================================================ */
#overlay {
  display: none;
  position: fixed; inset: 0; z-index: 199;
  background: rgba(0,0,0,.6);
}
#overlay.show { display: block; }

#sidebar {
  position: fixed; top: 56px; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto; overflow-x: hidden;
  z-index: 200;
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

#main {
  margin-top: 56px;
  margin-left: var(--sidebar-w);
  padding: 32px 40px 80px;
  max-width: 900px;
  min-height: calc(100vh - 56px);
}

/* ============================================================
   SIDEBAR NAV
   ============================================================ */
#nav-tree { padding: 12px 0 24px; }

.partie-group { margin-bottom: 6px; }

.partie-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-mute);
  padding: 16px 16px 6px;
}

.ch-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13.5px;
  padding: 8px 16px;
  text-align: left;
  cursor: pointer;
  transition: all .15s;
  border-left: 3px solid transparent;
  line-height: 1.35;
}
.ch-btn:hover { background: var(--bg3); color: var(--text); }
.ch-btn.active {
  background: rgba(108,99,255,.12);
  color: var(--accent2);
  border-left-color: var(--accent);
}

.ch-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: var(--bg3);
  color: var(--text-mute);
  padding: 2px 5px;
  border-radius: 4px;
  flex-shrink: 0;
}
.ch-btn.active .ch-id { background: rgba(108,99,255,.2); color: var(--accent2); }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp .35s ease both; }

/* ============================================================
   SECTION HEADER
   ============================================================ */
.section-header {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.section-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  color: var(--text);
  line-height: 1.2;
  width: 100%;
}
.partie-tag {
  font-size: 11px; font-weight: 600;
  background: rgba(108,99,255,.15);
  color: var(--accent2);
  padding: 3px 9px; border-radius: 20px;
  letter-spacing: .03em;
}
.ch-id-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: var(--bg3);
  color: var(--text-dim);
  padding: 3px 8px; border-radius: 5px;
}

/* ============================================================
   COURS BODY
   ============================================================ */
.cours-body { line-height: 1.7; }

.cours-body h3 {
  font-family: 'Playfair Display', serif;
  font-size: 19px;
  color: var(--accent2);
  margin: 28px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.cours-body h4 {
  font-size: 15px; font-weight: 700;
  color: var(--text);
  margin: 18px 0 8px;
}
.cours-body p { margin-bottom: 12px; color: var(--text); }
.cours-body b { color: #fff; }
.cours-body em { color: var(--accent2); font-style: italic; }
.cours-body ul { padding-left: 20px; margin-bottom: 14px; }
.cours-body li { margin-bottom: 5px; color: var(--text); }

.cours-body table {
  width: 100%; border-collapse: collapse;
  margin: 16px 0 20px;
  font-size: 14px;
}
.cours-body th {
  background: var(--bg3);
  color: var(--accent2);
  font-size: 12px; font-weight: 600; letter-spacing: .04em;
  text-transform: uppercase;
  padding: 9px 12px;
  text-align: left;
  border: 1px solid var(--border);
}
.cours-body td {
  padding: 9px 12px;
  border: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
}
.cours-body tr:nth-child(even) td { background: rgba(255,255,255,.02); }

.quote {
  border-left: 3px solid var(--accent);
  background: rgba(108,99,255,.08);
  padding: 12px 16px;
  border-radius: 0 8px 8px 0;
  margin: 14px 0;
  font-style: italic;
  color: var(--text);
  font-size: 15px;
}
.warn-box {
  background: rgba(251,146,60,.08);
  border: 1px solid rgba(251,146,60,.3);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--orange);
  font-size: 14px;
  margin: 12px 0;
}
.danger-box {
  background: rgba(248,113,113,.08);
  border: 1px solid rgba(248,113,113,.3);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--red);
  font-size: 14px;
  margin: 12px 0;
}
.retain-box {
  background: rgba(74,222,128,.05);
  border: 1px solid rgba(74,222,128,.25);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 22px 0;
}
.retain-box h3 {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--green);
  margin: 0 0 10px;
  padding: 0; border: none;
}
.retain-box ul { padding-left: 18px; margin: 0; }
.retain-box li { font-size: 14px; margin-bottom: 4px; }

/* ============================================================
   VOCAB
   ============================================================ */
.vocab-search { margin-bottom: 12px; }
.vocab-search input {
  width: 100%; max-width: 400px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  padding: 9px 14px;
  outline: none;
  transition: border-color .2s;
}
.vocab-search input:focus { border-color: var(--accent); }
.vocab-search input::placeholder { color: var(--text-mute); }

.vocab-count {
  font-size: 12px; color: var(--text-mute);
  margin-bottom: 16px;
}

.vocab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.vocab-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all .2s;
  overflow: hidden;
}
.vocab-card:hover { border-color: var(--border2); background: #22223a; }
.vocab-card .vt {
  font-weight: 700;
  font-size: 15px;
  color: var(--accent2);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.vocab-card .vt::after {
  content: '▸';
  font-size: 11px; color: var(--text-mute);
  margin-left: auto;
  transition: transform .2s;
}
.vocab-card.open .vt::after { transform: rotate(90deg); }
.vocab-card .vd {
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.5;
  display: none;
}
.vocab-card.open .vd { display: block; }

/* ============================================================
   FLASHCARDS
   ============================================================ */
.flash-counter {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 10px;
}
.flash-progress {
  background: var(--bg3);
  border-radius: 4px; height: 4px;
  margin-bottom: 8px; overflow: hidden;
}
.flash-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 4px;
  transition: width .3s ease;
}
.flash-hint {
  text-align: center; font-size: 12px;
  color: var(--text-mute);
  margin-bottom: 20px;
}
.flashcard-wrapper {
  perspective: 1200px;
  margin: 0 auto 22px;
  max-width: 640px;
  height: 220px;
}
.flashcard {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
.flashcard.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 32px;
  border-radius: 14px;
  border: 1px solid var(--border);
  text-align: center;
}
.card-face.front {
  background: linear-gradient(135deg, var(--bg2), var(--bg3));
}
.card-face.back {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  transform: rotateY(180deg);
  border-color: rgba(108,99,255,.4);
}
.card-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 14px;
}
.card-text {
  font-size: 16px; line-height: 1.6;
  color: var(--text);
}
.back-text { color: var(--text); }

.flash-nav {
  display: flex; justify-content: center; gap: 12px;
}
.flash-nav button {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  padding: 9px 20px;
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
}
.flash-nav button:hover { background: var(--bg2); color: var(--text); border-color: var(--accent); }

/* ============================================================
   QCM
   ============================================================ */
.qcm-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.qcm-score-badge {
  background: rgba(74,222,128,.15);
  color: var(--green);
  border: 1px solid rgba(74,222,128,.3);
  border-radius: 20px;
  font-size: 13px; font-weight: 600;
  padding: 3px 12px;
}
.qcm-q {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
  transition: border-color .2s;
}
.qcm-q.answered { border-color: var(--border2); }
.qcm-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--accent2);
  margin-bottom: 6px;
}
.qcm-q-text { font-size: 15px; margin-bottom: 14px; font-weight: 600; color: var(--text); }
.opt-list { display: flex; flex-direction: column; gap: 7px; }
.opt-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  padding: 9px 14px;
  border-radius: 8px;
  text-align: left;
  cursor: pointer;
  transition: all .2s;
}
.opt-btn:not(:disabled):hover { background: var(--bg3); color: var(--text); border-color: var(--accent); }
.opt-btn.correct { background: rgba(74,222,128,.12); border-color: rgba(74,222,128,.5); color: var(--green); }
.opt-btn.wrong   { background: rgba(248,113,113,.1);  border-color: rgba(248,113,113,.4); color: var(--red);   }
.opt-btn:disabled { cursor: default; }

.expl-box {
  display: none; margin-top: 12px;
  background: rgba(108,99,255,.08);
  border-left: 3px solid var(--accent);
  padding: 10px 14px;
  border-radius: 0 8px 8px 0;
  font-size: 14px; color: var(--text-dim);
}
.expl-box.show { display: block; }

.qcm-reset {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  padding: 9px 18px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 8px;
  transition: all .2s;
}
.qcm-reset:hover { color: var(--text); border-color: var(--text-dim); }

/* ============================================================
   CAS PRATIQUE
   ============================================================ */
.metho-box {
  background: rgba(167,139,250,.06);
  border: 1px solid rgba(167,139,250,.25);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 22px;
}
.metho-box h4 { font-size: 14px; color: var(--accent2); margin-bottom: 14px; }
.metho-steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.metho-step {
  background: var(--bg2);
  border-radius: 8px;
  padding: 12px 14px;
}
.step-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 600;
  color: rgba(108,99,255,.4);
  line-height: 1;
  margin-bottom: 4px;
}
.step-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.step-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; }

.cas-context {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 20px;
}
.cas-context h4 { font-size: 14px; color: var(--gold); margin-bottom: 8px; }
.cas-context p { font-size: 15px; color: var(--text); line-height: 1.65; }

.cas-q-block { margin-bottom: 18px; }
.cas-q-block h4 { font-size: 15px; color: var(--text); margin-bottom: 8px; }
.cas-q-block textarea {
  width: 100%; min-height: 120px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  padding: 12px 14px;
  resize: vertical; outline: none;
  transition: border-color .2s;
  line-height: 1.6;
}
.cas-q-block textarea:focus { border-color: var(--accent); }

.corr-toggle-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  padding: 9px 18px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 14px;
  transition: all .2s;
}
.corr-toggle-btn:hover { color: var(--text); border-color: var(--gold); }

.corr-body {
  display: none;
  background: rgba(240,192,64,.04);
  border: 1px solid rgba(240,192,64,.25);
  border-radius: 10px;
  padding: 20px 22px;
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.75;
  color: var(--text);
  font-family: 'Source Sans 3', sans-serif;
}
.corr-body.show { display: block; }

/* ============================================================
   WELCOME SCREEN
   ============================================================ */
.welcome-screen {
  max-width: 600px;
  padding: 20px 0;
}
.welcome-screen h2 {
  font-family: 'Playfair Display', serif;
  font-size: 36px; line-height: 1.15;
  color: var(--text);
  margin-bottom: 16px;
}
.welcome-screen p {
  font-size: 16px; color: var(--text-dim);
  line-height: 1.65; margin-bottom: 32px;
}
.welcome-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.welcome-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 22px;
  transition: border-color .2s;
}
.welcome-card:hover { border-color: var(--border2); }
.wc-num {
  font-family: 'Playfair Display', serif;
  font-size: 38px; color: var(--accent2);
  line-height: 1; margin-bottom: 4px;
}
.wc-label { font-size: 13px; color: var(--text-dim); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  #hamburger { display: block; }
  #sidebar {
    transform: translateX(-100%);
  }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; padding: 20px 18px 60px; }
  .mode-bar { display: none; }
  #chapter-title-bar { display: none; }
  .welcome-screen h2 { font-size: 26px; }
  .welcome-grid { grid-template-columns: 1fr 1fr; }
  .metho-steps { grid-template-columns: 1fr 1fr; }
  .flashcard-wrapper { height: 190px; }
}

@media (max-width: 420px) {
  .welcome-grid { grid-template-columns: 1fr; }
}

/* ============================================================
   MOBILE MODE BUTTONS (bottom bar on mobile)
   ============================================================ */
#mobile-modes {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
  background: rgba(15,15,20,.96);
  backdrop-filter: blur(14px);
  border-top: 1px solid var(--border);
  padding: 8px 10px 10px;
  gap: 4px;
  justify-content: space-around;
}
@media (max-width: 768px) {
  #mobile-modes { display: flex; }
}
.mob-mode-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--text-dim);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px;
  padding: 6px 8px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  transition: all .2s;
}
.mob-mode-btn:hover { color: var(--text); }
.mob-mode-btn.active {
  color: var(--accent2);
  background: rgba(108,99,255,.15);
  border-color: rgba(108,99,255,.35);
}
.mob-icon { font-size: 16px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<header id="topbar">
  <button id="hamburger" onclick="toggleSidebar()">☰</button>
  <div class="brand">DCG1 <span>Droit</span></div>
  <span id="chapter-title-bar">Sélectionnez un chapitre</span>
  <div class="mode-bar">
    <button class="mode-btn" onclick="setMode('cours')">📖 Cours</button>
    <button class="mode-btn" onclick="setMode('vocab')">📚 Vocabulaire</button>
    <button class="mode-btn" onclick="setMode('flash')">🃏 Flashcards</button>
    <button class="mode-btn" onclick="setMode('qcm')">✅ QCM</button>
    <button class="mode-btn" onclick="setMode('cas')">✍️ Cas pratique</button>
  </div>
</header>

<!-- OVERLAY (mobile) -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div id="nav-tree"></div>
</nav>

<!-- MAIN -->
<main id="main">
  <div id="content"></div>
</main>

<!-- MOBILE BOTTOM BAR -->
<div id="mobile-modes">
  <button class="mob-mode-btn" onclick="setMode('cours')">
    <span class="mob-icon">📖</span>Cours

{
  id:'1.1', partie:'P1 — Introduction générale au droit', title:'Introduction au droit',
  cours:`<h3>I. Les finalités du droit</h3>
<div class="quote">Adage latin : <b>« Ubi societas, ibi jus »</b> — Il n'y a pas de société sans droit, ni de droit sans société.</div>
<p>Selon le <b>Vocabulaire Juridique</b> (Cornu), le droit est un <em>« ensemble de règles de conduite socialement édictées et sanctionnées qui s'imposent aux membres de la société »</em>.</p>
<p>Le droit poursuit deux grandes finalités : <b>permettre la vie en société</b> (sécurité des personnes et des biens) et <b>organiser la Société</b> (organisation économique, politique et sociale).</p>
<h3>II. Les caractères de la règle de droit</h3>
<h4>A. Caractère général et abstrait</h4>
<p>La règle de droit <b>s'applique à tous les citoyens</b> de manière impersonnelle. Cela traduit l'égalité devant la loi.</p>
<h4>B. Caractère coercitif</h4>
<p>Le non-respect de la règle de droit fait l'objet d'une <b>sanction étatique</b>. C'est ce qui distingue fondamentalement la règle de droit des autres règles sociales.</p>
<h3>III. Les autres règles sociales : morale et éthique</h3>
<h4>A. La morale</h4>
<p>La morale a pour source une <b>conscience individuelle ou collective</b>. En cas de manquement, la sanction est <b>intérieure</b> (« mauvaise conscience »).</p>
<h4>B. L'éthique</h4>
<p>Les règles d'éthique trouvent leur source dans des <b>chartes ou des codes de déontologie</b>. Les sanctions sont <b>extérieures</b> : atteinte à la réputation.</p>
<h3>IV. Les branches du droit</h3>
<p>On distingue classiquement :</p>
<ul>
<li><b>Le droit privé</b> : régit les intérêts particuliers des individus (droit civil, commercial, du travail)</li>
<li><b>Le droit public</b> : régit l'intérêt général des citoyens (droit constitutionnel, administratif, fiscal)</li>
</ul>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Définition Cornu</b> : ensemble de règles socialement édictées et sanctionnées s'imposant aux membres de la société</li>

<li><b>Sanctions</b> : Droit = étatique ; Morale = intérieure ; Éthique = extérieure (réputation)</li>
<li><b>Droit privé</b> = intérêts particuliers ; <b>Droit public</b> = intérêt général</li>
</ul></div>`,

  cours:`<h3>I. Les sources internationales</h3>
<p>Les sources internationales sont principalement les <b>conventions et traités internationaux</b>. Ils créent des organisations internationales (ONU, OIT, OMC).</p>
<h4>Le Conseil de l'Europe</h4>
<p><b>46 États membres</b> (la Fédération de Russie n'en est plus membre depuis le <b>16 mars 2022</b>). Siège à <b>Strasbourg</b>. Convention européenne de sauvegarde des droits de l'homme (CEDH) signée le <b>4 novembre 1950</b>.</p>
<div class="warn-box">⚠️ À distinguer de l'Union européenne (27 États membres).</div>
<p><b>Adoption</b> = signature au niveau international. <b>Ratification</b> = procédure interne permettant d'intégrer le texte au droit national.</p>
<h3>II. Les sources du droit de l'Union européenne</h3>
<p>L'UE compte <b>27 États membres</b>. Traité en vigueur : <b>Traité de Lisbonne</b>, signé le <b>13 décembre 2007</b>, entré en vigueur le <b>1er décembre 2009</b>. Comprend TUE + TFUE.</p>
<h4>Droit dérivé</h4>
<table>
<tr><th>Acte</th><th>Portée</th><th>Application</th></tr>
<tr><td><b>Directive</b></td><td>Générale et impersonnelle</td><td><b>Transposition obligatoire</b> en droit interne. Prévoit objectif + délai.</td></tr>
<tr><td><b>Règlement</b></td><td>Générale et impersonnelle</td><td><b>Directement applicable</b> (effet direct)</td></tr>
</table>
<h3>III. Les sources nationales</h3>
<h4>A. Le bloc de constitutionnalité</h4>
<p><b>Constitution du 4 octobre 1958</b> (Ve République). Le <b>bloc de constitutionnalité</b> comprend :</p>
<ul>
<li>La Constitution du 4 octobre 1958</li>
<li>Le <b>Préambule de la Constitution du 27 octobre 1946</b></li>
<li>La <b>Déclaration des Droits de l'Homme et du Citoyen de 1789</b></li>
<li>La <b>Charte de l'environnement de 2004</b></li>
</ul>
<h4>B. Les types de lois</h4>
<table>
<tr><th>Type</th><th>Caractéristique</th></tr>
<tr><td><b>Loi constitutionnelle</b></td><td>Révise la Constitution. Approbation par référendum OU par le Congrès à la majorité des <b>3/5</b></td></tr>
<tr><td><b>Loi référendaire</b></td><td>Promulguée suite à un référendum</td></tr>
<tr><td><b>Loi organique</b></td><td>Fixe les modalités d'organisation et de fonctionnement des pouvoirs publics</td></tr>
<tr><td><b>Loi ordinaire</b></td><td>Toutes les lois ne répondant pas aux 3 définitions ci-dessus</td></tr>
</table>
<h4>C. Le règlement et l'ordonnance</h4>
<p><b>Article 37</b> de la Constitution : matières ne relevant pas du domaine de la loi → décrets. L'<b>ordonnance</b> : Gouvernement intervient dans le domaine législatif. Procédure : <b>loi d'habilitation → rédaction → loi de ratification</b>.</p>
<h4>D. La coutume</h4>
<p>2 éléments : <b>matériel</b> (répétition) + <b>psychologique</b> (conviction de son caractère obligatoire).</p>
<h3>IV. La hiérarchie des normes — Pyramide de Kelsen</h3>
<p>De la plus haute à la plus basse : <b>bloc de constitutionnalité → bloc de conventionnalité (traités + UE) → lois → règlements</b>.</p>
<p><b>Contrôle de constitutionnalité a priori</b> : avant la promulgation. Saisine par : Président de la République, Premier Ministre, Président AN, Président Sénat, <b>60 députés</b> ou <b>60 sénateurs</b>.</p>
<p><b>QPC (a posteriori)</b> : soulevée au cours d'un litige. 3 critères : disposition applicable au litige + constitutionnalité non déjà vérifiée + caractère sérieux.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>CEDH</b> : 4 novembre 1950 ; Conseil de l'Europe : 46 États, Strasbourg</li>
<li><b>UE</b> : 27 États ; Traité de Lisbonne : signé 13/12/2007, en vigueur 1/12/2009</li>
<li><b>Directive</b> = transposition obligatoire ; <b>Règlement</b> = effet direct</li>
<li><b>Constitution</b> : 4 octobre 1958</li>

<li><b>QPC (a posteriori)</b> : 3 critères → applicable + pas déjà vérifiée + caractère sérieux</li>
<li><b>Ordonnance</b> : loi d'habilitation → rédaction → loi de ratification</li>
</ul></div>`,

{
  id:'1.3', partie:'P1 — Introduction générale au droit', title:'La preuve des droits',
  cours:`<h3>I. L'objet et la charge de la preuve</h3>
<p>Il n'est pas nécessaire de <b>prouver la loi</b>. Il faut prouver les <b>faits et actes juridiques</b> dans le cadre d'un litige.</p>
<ul>
<li>Le <b>fait juridique</b> ne recherche pas d'effets de droit (accident, naissance)</li>
<li>L'<b>acte juridique</b> a pour objectif de rechercher des effets de droit (contrat, testament)</li>
</ul>
<div class="quote"><b>Article 9 du Code de procédure civile</b> : <em>« Il incombe à chaque partie de prouver conformément à la loi les faits nécessaires au succès de sa prétention »</em>. Charge sur le <b>demandeur</b>.</div>
<p>En droit civil : procédure <b>accusatoire</b> (preuves apportées par les parties). En droit pénal/administratif : procédure <b>inquisitoire</b> (le juge réunit les preuves).</p>
<h3>II. Les moyens de preuve</h3>
<h4>Système de la preuve légale (actes juridiques &gt; 1 500 €)</h4>
<p>Les actes juridiques portant sur un montant <b>supérieur à 1 500 €</b> doivent être prouvés par un <b>écrit</b>.</p>
<p><b>Exceptions (article 1360 du Code civil)</b> : preuve libre si :</p>
<ul>
<li>Impossibilité <b>matérielle</b> (urgence, accident imprévu)</li>
<li>Impossibilité <b>morale</b> : acte entre membres de la même <b>famille</b>, lien de <b>subordination</b>, partie <b>incapable d'écrire</b></li>
<li><b>Usage</b> de ne pas établir un écrit dans ce domaine</li>
<li>Perte de l'écrit par <b>force majeure</b></li>
</ul>
<h4>Système de la preuve libre</h4>
<p>Applicable pour : les faits juridiques, les actes ≤ 1 500 €, en <b>droit commercial</b>, en <b>droit pénal</b>, en <b>droit du travail</b>.</p>
<h4>L'acte authentique</h4>
<p>Reçu par un <b>officier public</b> (notaire, officier d'état civil). L'<b>original</b> = la <b>minute</b> (conservée par l'officier). Les <b>copies</b> = les <b>expéditions</b>. Pour contester : <b>inscription en faux</b>.</p>
<h4>L'acte sous signature privée (SSP)</h4>
<p>Rédigé directement entre les parties. Doit être <b>signé</b>. Formalités :</p>
<ul>
<li><b>Contrat synallagmatique</b> : <b>formalité du double</b></li>
<li><b>Acte unilatéral mentionnant une somme</b> : somme écrite <b>en toutes lettres</b></li>
</ul>
<h4>Autres moyens de preuve</h4>
<table>
<tr><th>Moyen</th><th>Conditions</th><th>Sanction du faux</th></tr>
<tr><td><b>Témoignage</b></td><td>Personnes majeures capables. Appréciation souveraine des juges du fond.</td><td><b>5 ans + 75 000 €</b></td></tr>

Q2 — Valeur probatoire du SMS :
Le SMS constitue à la fois :
• Un COMMENCEMENT DE PREUVE PAR ÉCRIT (art. 1362) : émanant du frère, rendant vraisemblable le prêt. Peut être complété par tout moyen.
• Un AVEU EXTRAJUDICIAIRE : divisible et rétractable, mais soumis à l'appréciation des juges du fond.
• Un ÉCRIT ÉLECTRONIQUE : même force probante que l'écrit papier si l'auteur est identifiable.

Q3 — Preuve de la vente à 700 € :
700 € ≤ 1 500 € → preuve LIBRE. M. Lefebvre peut prouver par tout moyen : témoignages, relevés bancaires, SMS, photos, présomptions de fait. L'absence de facture n'est pas un obstacle.`

  cours:`<h3>I. Les juridictions européennes</h3>
<h4>Cour européenne des Droits de l'Homme (CEDH)</h4>
<p><b>Créée en 1959. Siège à Strasbourg.</b> Conditions pour la saisir : avoir <b>épuisé toutes les voies de recours internes</b> + saisine au <b>plus tard 4 mois après la dernière décision interne</b> + être <b>personnellement et directement victime</b>.</p>
<h4>CJUE — Cour de justice de l'Union européenne</h4>
<p>Créée en <b>1952</b>. Siège à <b>Luxembourg</b>. Compétences : <b>renvoi préjudiciel</b>, <b>recours en manquement</b>, <b>recours en annulation</b>, <b>pourvoi</b> contre le Tribunal.</p>
<h3>II. Les juridictions nationales</h3>
<h4>Ordre administratif</h4>
<table>
<tr><th>Degré</th><th>Juridiction</th></tr>
<tr><td>1er degré</td><td>Tribunal administratif</td></tr>
<tr><td>2e degré</td><td>Cour administrative d'appel</td></tr>
<tr><td>Haute juridiction</td><td><b>Conseil d'État</b> (un seul pour la France)</td></tr>
</table>
<h4>Ordre judiciaire — Droit commun</h4>
<table>
<tr><th>Degré</th><th>Juridiction</th></tr>
<tr><td>1er degré</td><td><b>Tribunal judiciaire</b> (litiges civils &gt; 10 000 €) ou <b>Tribunal de proximité</b> (≤ 10 000 €, juge unique)</td></tr>
<tr><td>2e degré</td><td><b>Cour d'appel</b> (36 en France)</td></tr>
<tr><td>Haute juridiction</td><td><b>Cour de cassation</b> (6 chambres : 3 civiles, commerciale, sociale, criminelle)</td></tr>
</table>
<h4>Juridictions d'exception</h4>
<ul>
<li><b>Tribunal de commerce</b> : litiges entre commerçants. Juges <b>élus parmi les commerçants</b>.</li>
<li><b>Conseil de prud'hommes</b> : litiges salarié/employeur. Conseillers prud'hommes <b>élus parmi employeurs et salariés</b>.</li>
<li><b>Juridictions pénales</b> : Tribunal de police (contraventions) / Tribunal correctionnel (délits) / Cour d'assises (crimes)</li>
</ul>
<h3>III. Compétences et procédure</h3>
<p><b>Compétence matérielle</b> (d'attribution) : détermine la juridiction selon <b>l'objet du litige</b>.</p>
<p><b>Compétence territoriale</b> : principe = <b>domicile du défendeur</b> (siège social pour PM).</p>
<div class="danger-box">⚠️ Clauses attributives de compétence : valables <b>uniquement entre commerçants</b>.</div>
<p><b>Prescription de droit commun : 5 ans</b>. Délai d'appel : <b>1 mois</b>. Pas d'appel si ≤ <b>5 000 €</b> (dernier ressort).</p>
<p>La <b>Cour de cassation</b> statue <b>en droit uniquement</b>. 3 issues : rejet / cassation avec renvoi / cassation sans renvoi.</p>
<h3>IV. Personnel de justice</h3>
<p><b>ENM</b> : 31 mois. <b>CAPA</b> (avocat) : 18 mois. <b>Commissaires de justice</b> (depuis <b>1er juillet 2022</b>) : regroupent huissiers + commissaires-priseurs judiciaires.</p>

{
  id:'1.5', partie:'P1 — Introduction générale au droit', title:'Les MARD',
  cours:`<h3>Modes Alternatifs de Règlement des Différends</h3>
<p>Les MARD permettent de résoudre les litiges sans recourir à la procédure judiciaire étatique. Contribuent au <b>délai raisonnable</b> de la justice.</p>
<h3>I. La conciliation</h3>
<p><b>Objectif</b> : proposer aux parties une solution au litige.</p>
<p>Le <b>conciliateur de justice</b> est un auxiliaire de justice assermenté exerçant à <b>titre bénévole</b> → <b>gratuit</b> pour les parties.</p>
<p><b>Préalable obligatoire</b> à l'audience pour : litiges <b>≤ 5 000 €</b> et conflits de voisinage. En droit du travail : <b>bureau de conciliation et d'orientation</b> (étape obligatoire).</p>
<p>Issue : <b>procès-verbal d'accord ou de désaccord</b>. Force exécutoire : <b>homologation par le juge</b>.</p>
<h3>II. La médiation</h3>
<p><b>Objectif</b> : aider les parties à parvenir à un accord. Médiateur <b>choisi et rémunéré par les parties</b> (à défaut d'accord : à parts égales).</p>
<div class="warn-box">⚠️ Exception : en droit de la consommation, le consommateur peut saisir <b>gratuitement</b> un médiateur de la consommation.</div>
<p>Issue : délai de réflexion de <b>8 jours</b> → constat d'accord ou de désaccord. Force exécutoire : <b>homologation du juge</b>.</p>
<h3>III. L'arbitrage</h3>
<h4>A. Clause compromissoire (avant le litige)</h4>
<p>À peine de nullité : <b>écrite</b> + <b>désigner les arbitres</b> (ou leurs modalités). La clause est <b>autonome par rapport au contrat</b>.</p>
<div class="danger-box">⚠️ Non valable dans les <b>contrats de travail</b> et les <b>actes mixtes</b>.</div>
<h4>B. Compromis d'arbitrage (après le litige)</h4>
<p>À peine de nullité : doit mentionner l'<b>objet du litige</b>.</p>
<h4>Domaines exclus de l'arbitrage</h4>
<p>État et capacité des personnes, divorce, collectivités publiques, sanctions pénales et administratives.</p>
<h4>Le tribunal arbitral</h4>
<p>Composé d'un <b>nombre impair d'arbitres</b> statuant à la <b>majorité des voix</b>. Peut statuer <b>en droit</b> ou <b>en amiable compositeur</b> (en équité). Force exécutoire : ordonnance d'<b>exequatur</b> du <b>Tribunal judiciaire</b>.</p>
<h3>IV. Décret du 29 juillet 2023</h3>
<ul>
<li><b>Audience de règlement amiable</b> : menée par un juge hors formation de jugement.</li>
<li><b>Césure du procès</b> : décision partielle sur le point le plus important. Demandée par les parties.</li>
</ul>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Conciliation</b> : gratuite (bénévole) ; <b>Médiation</b> : payante (sauf conso)</li>
<li><b>Préalable obligatoire</b> : litiges ≤ 5 000 € + conflits de voisinage</li>
<li><b>Délai réflexion médiation</b> : 8 jours</li>
<li><b>Clause compromissoire</b> : écrite + autonome ; NON valable dans contrats travail et actes mixtes</li>
<li><b>Compromis d'arbitrage</b> : après litige, doit mentionner l'objet du litige</li>
<li><b>Tribunal arbitral</b> : nombre impair, droit ou amiable compositeur</li>
<li><b>Force exécutoire sentence</b> : ordonnance d'exequatur du TJ</li>
<li><b>Décret 29 juillet 2023</b> : audience de règlement amiable + césure du procès</li>
</ul></div>`,

{
  id:'2.1', partie:'P2 — Les personnes et les biens', title:'Les personnes',
  cours:`<h3>I. La notion de personne juridique</h3>
<p>La personnalité juridique est l'<em>« aptitude à être titulaire actif ou passif de droits subjectifs »</em> (Prof. Terré). Elle permet de faire valoir ses droits et de réaliser des actes juridiques.</p>
<h4>Personnes physiques</h4>
<p>Tout être humain. Personnalité juridique acquise à la <b>naissance</b> (né vivant) et perdue au <b>décès</b>. Exception : <b>infans conceptus pro nato habetur quoties de commodis ejus agitur</b> — l'enfant conçu peut hériter s'il naît viable.</p>
<h4>Personnes morales</h4>
<p>Entité abstraite à qui la loi reconnaît des droits et des obligations. Personnalité juridique distincte de celle des membres. Immatriculation au <b>RNE</b> (depuis 1er janvier 2023). Fin = <b>dissolution</b>. Règle : <b>1 personne juridique = 1 patrimoine</b>. Principe de <b>spécialité</b> : agit uniquement dans son objet social.</p>
<h3>II. Capacité juridique</h3>
<p><b>Capacité de jouissance</b> = aptitude à acquérir des droits. <b>Capacité d'exercice</b> = aptitude à exercer les droits dont on est titulaire. L'<b>incapacité d'exercice</b> concerne les mineurs non émancipés et les majeurs protégés.</p>
<h3>III. Classification des actes juridiques</h3>
<table>
<tr><th>Type</th><th>Définition</th></tr>
<tr><td><b>Actes de la vie courante</b></td><td>Vie quotidienne, faible montant</td></tr>
<tr><td><b>Actes conservatoires/d'administration</b></td><td>Éviter une perte, gestion normale d'un bien</td></tr>
<tr><td><b>Actes de disposition</b></td><td>Opération grave qui engage le patrimoine (vente, hypothèque)</td></tr>
</table>
<h3>IV. Protection des mineurs (majorité : 18 ans depuis 1974)</h3>
<ul>
<li>Actes de la <b>vie courante</b> → mineur seul (sauf lésion)</li>
<li>Actes d'<b>administration</b> → représentation par les parents</li>
<li>Actes de <b>disposition</b> → représentation + autorisation du juge des tutelles. Seul → <b>nullité relative</b></li>
</ul>
<p>Émancipation possible à <b>16 ans</b>.</p>
<h3>V. Protection des majeurs</h3>
<p>Justifiée uniquement par une <b>altération médicalement établie des facultés</b>. Principes : <b>nécessité</b>, <b>subsidiarité</b>, <b>proportionnalité</b>, <b>limitation dans le temps</b>. Le majeur protégé peut toujours accomplir seul les <b>actes purement personnels</b> (déclaration de naissance, vote, mariage…).</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Personnalité juridique PF</b> : naissance → décès</li>
<li><b>Personnalité juridique PM</b> : immatriculation RNE → dissolution</li>
<li><b>Principe de spécialité (PM)</b> : objet social uniquement</li>
<li><b>1 PJ = 1 patrimoine</b></li>
<li><b>Majorité</b> : 18 ans ; émancipation : 16 ans</li>
<li><b>Acte de disposition mineur sans autorisation</b> → nullité relative</li>
<li><b>Majeur protégé</b> : toujours actes purement personnels seul</li>
</ul></div>`,

    correction:`Q1 — TechPro SA et l'immeuble agricole :
PRINCIPE DE SPÉCIALITÉ : une PM ne peut agir que dans le domaine prévu par son objet social. L'exploitation agricole n'étant pas prévue dans les statuts, TechPro SA ne peut valablement réaliser cet acte. Il faudrait d'abord modifier l'objet social en AGE (assemblée générale extraordinaire).

{
  id:'2.2', partie:'P2 — Les personnes et les biens', title:'Les commerçants personnes physiques',
  cours:`<h3>I. La liberté du commerce et de l'industrie</h3>
<p>Affirmée par les <b>décrets d'Allarde des 2 et 17 mars 1791</b>. Valeur constitutionnelle (décision CC du <b>16 janvier 1982</b>).</p>
<h3>II. Les actes de commerce</h3>
<table>
<tr><th>Type</th><th>Exemples</th></tr>
<tr><td><b>Par nature</b></td><td>Négoce (achat pour revendre), transformation industrielle, services (banque, assurance, hôtellerie, spectacles)</td></tr>
<tr><td><b>Par la forme</b></td><td>Lettres de change. Sociétés commerciales par la forme (SNC, SCS, SARL, SA, SAS)</td></tr>
<tr><td><b>Par accessoire</b></td><td>Acte civil devenant commercial car accompli par un commerçant pour son commerce</td></tr>
</table>
<h3>III. Définition et obligations du commerçant</h3>
<p><b>Art. L. 121-1 Code de commerce</b> : <em>« sont commerçants ceux qui exercent des actes de commerce et en font leur profession habituelle »</em>.</p>
<p>Immatriculation au <b>RNE</b> : au plus tôt <b>1 mois avant</b> + au plus tard <b>15 jours après</b> le début de l'activité. Sans immatriculation = <b>commerçant de fait</b>.</p>
<p><b>Comptes annuels</b> : bilan + compte de résultat + annexes → <b>image fidèle</b>. Sanction faux : <b>3 ans + 45 000 €</b>.</p>
<h3>IV. Protection du patrimoine du commerçant</h3>
<p><b>Résidence principale</b> : insaisissable de plein droit (loi Macron, <b>7 août 2015</b>).</p>
<p><b>Statut EI</b> (loi du 14 février 2022, en vigueur le <b>15 mai 2022</b>) : séparation automatique entre patrimoine personnel et professionnel. Délai de réflexion de <b>7 jours</b> pour renoncer.</p>
<p><b>Conjoint collaborateur</b> : depuis 2022 → durée limitée à <b>5 ans</b>. Au-delà : choix entre salarié ou associé.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Art. L. 121-1 C. com.</b> : commerçant = exerce actes de commerce + profession habituelle</li>
<li><b>Immatriculation RNE</b> : 1 mois avant → 15 jours après</li>
<li><b>Comptes annuels</b> : bilan + compte de résultat + annexes = image fidèle</li>
<li><b>EI depuis 15 mai 2022</b> : séparation automatique patrimoine personnel/professionnel</li>
<li><b>Résidence principale</b> : insaisissable de plein droit (loi Macron 2015)</li>
<li><b>Conjoint collaborateur</b> : depuis 2022 → max 5 ans</li>
</ul></div>`,

    correction:`Q1 — M. Renard non immatriculé :
M. Renard exerce des actes de commerce (achat pour revendre) de manière habituelle et indépendante → il est COMMERÇANT au sens de l'art. L.121-1. Sans immatriculation, il est COMMERÇANT DE FAIT : il subit les obligations (comptabilité, responsabilité) sans les avantages (bail commercial, bénéfice plein du statut EI). Il doit régulariser immédiatement au RNE.

Q2 — Statut de Mme Renard :
Mme Renard remplit les conditions du CONJOINT COLLABORATEUR (travail régulier, sans rémunération, sans qualité d'associé). Cependant, depuis 2022 ce statut est limité à 5 ANS. Mme Renard travaille depuis 6 ans → elle dépasse la durée maximale. M. Renard doit faire choisir à Mme Renard entre le statut de salarié ou d'associée.

Q3 — Protection du patrimoine :

{
  id:'2.4', partie:'P2 — Les personnes et les biens', title:'Théorie du patrimoine',
  cours:`<h3>I. Définition et composition du patrimoine</h3>
<p>Le patrimoine est <em>« l'ensemble des biens et des obligations d'une même personne, de l'actif et du passif, envisagé comme formant une universalité de droit »</em> (Vocabulaire Juridique).</p>
<p><b>Actif</b> : biens et droits appréciables en argent. <b>Passif</b> : dettes et obligations appréciables en argent.</p>
<h4>Droits patrimoniaux vs extra-patrimoniaux</h4>
<p><b>Droits patrimoniaux</b> : évaluables en argent. Caractéristiques : <b>cessibles</b>, <b>transmissibles</b>, <b>saisissables</b>, <b>prescriptibles</b>.</p>
<p><b>Droits extra-patrimoniaux</b> : non évaluables en argent (droits familiaux, droits de la personnalité).</p>
<h4>Droits réels vs droits personnels</h4>
<p><b>Droits réels</b> : portent sur un bien. <b>Droits personnels</b> (créance) : droit d'un créancier d'exiger d'un débiteur une prestation.</p>
<h4>Meubles vs immeubles</h4>
<table>
<tr><th>Catégorie</th><th>Sous-catégories</th></tr>
<tr><td><b>Meubles</b></td><td>Par nature (se déplacent), par détermination de la loi (obligations, actions de sociétés)</td></tr>
<tr><td><b>Immeubles</b></td><td>Par nature (fonds, bâtiments), par <b>destination</b> (meubles affectés au fonds), par l'objet</td></tr>
</table>
<h3>II. Les théories du patrimoine</h3>
<h4>A. Théorie classique (Aubry et Rau)</h4>
<p><b>Unicité</b> et <b>indivisibilité</b> : chaque PJ n'a qu'un seul patrimoine. <b>Art. 2284 Code civil</b> : droit de gage général — l'actif répond du passif.</p>
<h4>B. Patrimoine d'affectation</h4>
<p>Manifestations en droit français : statut EI, <b>fiducie</b> (loi 19 février 2007, art. 2011 Code civil), sociétés unipersonnelles.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Actif</b> = biens et droits ; <b>Passif</b> = dettes</li>
<li><b>Droits patrimoniaux</b> : cessibles, transmissibles, saisissables, prescriptibles</li>
<li><b>Immeuble par destination</b> : meuble affecté au service/exploitation d\'un fonds</li>
<li><b>Théorie classique</b> (Aubry et Rau) : unicité + indivisibilité</li>
<li><b>Art. 2284</b> : droit de gage général</li>
<li><b>Fiducie</b> : art. 2011 Code civil ; loi 19 février 2007</li>
</ul></div>`,

{
  id:'2.5', partie:'P2 — Les personnes et les biens', title:'La propriété',
  cours:`<h3>I. Le droit de propriété</h3>
<p><b>Art. 544 du Code civil</b> (inchangé depuis 1804) : <em>« la propriété est le droit de jouir et disposer des choses de la manière la plus absolue, pourvu qu'on n'en fasse pas un usage prohibé par les lois ou par les règlements »</em>.</p>
<h4>Les 3 attributs</h4>
<table>
<tr><th>Attribut</th><th>Définition</th></tr>
<tr><td><b>Usus</b></td><td>Droit d'<b>usage</b> : utiliser ou non la chose</td></tr>
<tr><td><b>Fructus</b></td><td>Droit de <b>jouissance</b> : percevoir les fruits sans altérer la substance</td></tr>
<tr><td><b>Abusus</b></td><td>Droit de <b>disposition</b> : vendre, donner en garantie, détruire</td></tr>
</table>
<h4>Les 3 caractères</h4>
<ul>
<li><b>Absolu</b> : tous les actes souhaités dans les limites légales</li>
<li><b>Perpétuel</b> : transmis aux héritiers, imprescriptible</li>
<li><b>Exclusif</b> : monopole du propriétaire</li>
</ul>
<h3>II. L'usufruit et la nue-propriété</h3>
<p><b>Art. 578</b> : <em>« l'usufruit est le droit de jouir des choses dont un autre a la propriété, comme le propriétaire lui-même, mais à la charge d'en conserver la substance »</em>.</p>
<p><b>Usufruitier</b> = usus + fructus. <b>Nu-propriétaire</b> = abusus.</p>
<p>Obligations du nu-propriétaire : supporter les <b>grosses réparations (art. 606)</b> : gros murs et voûtes, poutres et couvertures entières, digues, murs de soutènement. <b>Liste exhaustive</b>.</p>
<h3>III. Limites du droit de propriété</h3>
<h4>Abus du droit de propriété</h4>
<p>2 conditions cumulatives : <b>intention de nuire</b> + <b>usage d'un droit sans utilité</b>. Sanction : responsabilité extracontractuelle.</p>
<h4>Troubles anormaux du voisinage</h4>
<p>Sanction <b>sans démonstration de faute</b>. Trouble doit être <b>anormal</b> : fréquence + gravité. <b>Exception de pré-occupation</b>.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Art. 544</b> : définition légale du droit de propriété (1804)</li>
<li><b>Usus</b> + <b>Fructus</b> + <b>Abusus</b></li>
<li><b>Art. 578</b> : définition de l\'usufruit</li>
<li><b>Grosses réparations (art. 606)</b> : à la charge du nu-propriétaire — liste exhaustive</li>
<li><b>Abus de droit</b> : intention de nuire + sans utilité</li>
<li><b>Troubles anormaux de voisinage</b> : sans faute, caractère anormal</li>
</ul></div>`,

{
  id:'3.1', partie:'P3 — L\'entreprise et les contrats', title:'La formation du contrat',
  cours:`<h3>I. Notion de contrat</h3>
<p><b>Art. 1101 du Code civil</b> (Ordonnance du <b>10 février 2016</b>) : <em>« le contrat est un accord de volontés entre deux ou plusieurs personnes destiné à créer, modifier, transmettre ou éteindre des obligations »</em>.</p>
<h4>Classifications</h4>
<table>
<tr><th>Classification</th><th>Types</th></tr>
<tr><td>Nombre de parties</td><td><b>Synallagmatique</b> (obligations réciproques) / <b>Unilatéral</b></td></tr>
<tr><td>Contrepartie</td><td><b>À titre onéreux</b> / <b>À titre gratuit</b></td></tr>
<tr><td>Exécution</td><td><b>Instantané</b> / <b>À exécution successive</b></td></tr>
<tr><td>Négociation</td><td><b>De gré à gré</b> / <b>D'adhésion</b></td></tr>
</table>
<h3>II. Les conditions de validité du contrat (art. 1128)</h3>
<ul>
<li><b>Consentement</b> valable (non vicié)</li>
<li><b>Capacité</b> de contracter</li>
<li>Un <b>contenu licite et certain</b></li>
</ul>
<h4>L'offre</h4>
<p>Doit être <b>ferme</b> et <b>précise</b>. Caducité au décès ou incapacité de l'offrant. Formation du contrat : <b>théorie de la réception</b>.</p>
<h4>Les vices du consentement</h4>
<table>
<tr><th>Vice</th><th>Définition</th><th>Sanction</th></tr>
<tr><td><b>Erreur</b></td><td>Fausse représentation. Doit être <b>excusable</b> + porter sur les <b>qualités essentielles</b>.</td><td>Nullité relative</td></tr>
<tr><td><b>Dol</b></td><td>Manœuvres frauduleuses délibérées. Élément matériel + intentionnel.</td><td>Nullité relative + D&I</td></tr>
<tr><td><b>Violence</b></td><td>Menace d'un dommage grave et imminent. Violence économique admise.</td><td>Nullité relative + D&I</td></tr>
</table>
<h3>III. La période précontractuelle</h3>
<p>Rupture fautive des pourparlers → <b>responsabilité extracontractuelle</b>.</p>
<table>
<tr><th>Type</th><th>Définition</th></tr>
<tr><td><b>Promesse unilatérale</b></td><td>Faculté de conclure accordée au bénéficiaire. Rétractation → D&I.</td></tr>
<tr><td><b>Pacte de préférence</b></td><td>Priorité accordée si vente. Tiers complice peut être substitué.</td></tr>
</table>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Art. 1101</b> : définition du contrat (réforme 10 fév. 2016)</li>
<li><b>Art. 1128</b> : 3 conditions : consentement + capacité + contenu licite</li>
<li><b>Erreur</b> : excusable + qualités essentielles → nullité relative</li>
<li><b>Dol</b> : manœuvres frauduleuses → nullité relative + D&I</li>
<li><b>Violence</b> : menace grave (économique admise) → nullité relative + D&I</li>
<li><b>Rupture pourparlers</b> : responsabilité extracontractuelle si fautive</li>
</ul></div>`,

{
  id:'3.2', partie:'P3 — L\'entreprise et les contrats', title:'Les effets et l\'inexécution du contrat',
  cours:`<h3>I. Les effets du contrat</h3>
<h4>A. Force obligatoire (art. 1103)</h4>
<p><em>« Les contrats légalement formés tiennent lieu de loi à ceux qui les ont faits »</em>. Principe : <b>pacta sunt servanda</b>.</p>
<h4>B. Relativité des contrats (art. 1199)</h4>
<p>Le contrat ne crée d'obligations qu'entre les parties. Exception : <b>stipulation pour autrui</b> (art. 1205) — ex : assurance-vie.</p>
<h4>C. L'imprévision (art. 1195 — réforme 2016)</h4>
<p>Changement imprévisible rendant l'exécution excessivement onéreuse → renégociation. En cas d'échec : le juge adapte ou met fin au contrat.</p>
<h3>II. L'inexécution du contrat</h3>
<h4>A. Exception d'inexécution (art. 1219)</h4>
<p>Refus légitime d'exécuter si l'autre n'exécute pas sa propre obligation.</p>
<h4>B. La résolution</h4>

let currentCh = null;
let currentMode = 'cours';
let flashIdx = 0;
let flashFlipped = false;
let qcmAnswered = {};

function buildNav() {
  const tree = document.getElementById('nav-tree');
  const parties = {};
  CHAPTERS.forEach(ch => {
    if (!parties[ch.partie]) parties[ch.partie] = [];
    parties[ch.partie].push(ch);
  });
  Object.entries(parties).forEach(([p, chs]) => {
    const g = document.createElement('div');
    g.className = 'partie-group';
    g.innerHTML = `<div class="partie-label">${p}</div>`;
    chs.forEach(ch => {
      const b = document.createElement('button');
      b.className = 'ch-btn';
      b.id = 'nav-' + ch.id;
      b.innerHTML = `<span class="ch-id">${ch.id}</span>${ch.title}`;
      b.onclick = () => loadChapter(ch.id);
      g.appendChild(b);
    });
    tree.appendChild(g);
  });
}

function loadChapter(id) {
  currentCh = CHAPTERS.find(c => c.id === id);
  flashIdx = 0; flashFlipped = false; qcmAnswered = {};
  document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + id);
  if (nb) { nb.classList.add('active'); nb.scrollIntoView({block:'nearest'}); }
  document.getElementById('chapter-title-bar').textContent = currentCh.title;
  renderMode();
  if (window.innerWidth <= 768) closeSidebar();
}

function setMode(m) {
  currentMode = m;
  const labels = {cours:'📖 Cours', vocab:'📚 Vocabulaire', flash:'🃏 Flashcards', qcm:'✅ QCM', cas:'✍️ Cas pratique'};
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === labels[m]);
  });
  document.querySelectorAll('.mob-mode-btn').forEach(b => {
    const txt = b.querySelector('.mob-icon')?.nextSibling?.textContent?.trim() || '';
    const map = {Cours:'cours', Vocab:'vocab', Flash:'flash', QCM:'qcm', Cas:'cas'};
    b.classList.toggle('active', map[txt] === m);
  });
  flashIdx = 0; flashFlipped = false; qcmAnswered = {};
  renderMode();
}

function renderMode() {
  const c = document.getElementById('content');
  if (!currentCh) { renderWelcome(); return; }
  c.className = '';
  c.innerHTML = '';
  void c.offsetWidth;
  c.classList.add('fade-up');
  const header = `<div class="section-header">
    <div class="partie-tag">${currentCh.partie}</div>
    <div class="ch-id-tag">${currentCh.id}</div>
    <h2>${currentCh.title}</h2>
  </div>`;
  if (currentMode === 'cours') c.innerHTML = header + `<div class="cours-body">${currentCh.cours}</div>`;
  else if (currentMode === 'vocab') renderVocab(c, header);
  else if (currentMode === 'flash') renderFlash(c, header);
  else if (currentMode === 'qcm') renderQCM(c, header);
  else if (currentMode === 'cas') renderCas(c, header);
}

function renderWelcome() {
  const c = document.getElementById('content');
  const total = CHAPTERS.length;
  const totalQcm = CHAPTERS.reduce((a,ch)=>a+(ch.qcm||[]).length,0);
  const totalFlash = CHAPTERS.reduce((a,ch)=>a+(ch.flashcards||[]).length,0);
  const totalVocab = CHAPTERS.reduce((a,ch)=>a+(ch.vocab||[]).length,0);
  c.innerHTML = `<div class="welcome-screen fade-up">
    <h2>DCG1 Droit<br>Tout le programme</h2>
    <p>Cours complets, vocabulaire juridique, flashcards, QCM et cas pratiques — tout le programme DCG1 pour réussir l'examen national.</p>
    <div class="welcome-grid">
      <div class="welcome-card"><div class="wc-num">${total}</div><div class="wc-label">Chapitres</div></div>
      <div class="welcome-card"><div class="wc-num">${totalVocab}</div><div class="wc-label">Termes juridiques</div></div>
      <div class="welcome-card"><div class="wc-num">${totalFlash}</div><div class="wc-label">Flashcards</div></div>
      <div class="welcome-card"><div class="wc-num">${totalQcm}</div><div class="wc-label">Questions QCM</div></div>
    </div>
  </div>`;
}

function renderVocab(c, header) {
  const terms = currentCh.vocab || [];
  c.innerHTML = header +
    `<div class="vocab-search"><input type="text" placeholder="Rechercher un terme..." id="vocab-input" oninput="filterVocab()" /></div>
     <div class="vocab-count" id="vocab-count">${terms.length} terme${terms.length>1?'s':''}</div>
     <div class="vocab-grid" id="vocab-grid"></div>`;
  renderVocabCards(terms);
}
function renderVocabCards(terms) {
  const grid = document.getElementById('vocab-grid');
  if (!grid) return;
  grid.innerHTML = terms.map((t,i) =>
    `<div class="vocab-card" id="vc-${i}" onclick="toggleVocab(${i})">
      <div class="vt">${t.t}</div>
      <div class="vd">${t.d}</div>
    </div>`).join('');
}
function filterVocab() {
  const q = document.getElementById('vocab-input').value.toLowerCase();
  const terms = (currentCh.vocab||[]).filter(t => t.t.toLowerCase().includes(q) || t.d.toLowerCase().includes(q));
  document.getElementById('vocab-count').textContent = terms.length + ' terme' + (terms.length>1?'s':'');
  renderVocabCards(terms);
}
function toggleVocab(i) {
  const card = document.getElementById('vc-'+i);
  if (card) card.classList.toggle('open');
}

function renderFlash(c, header) {
  const cards = currentCh.flashcards || [];
  if (!cards.length) { c.innerHTML = header + '<p style="color:var(--text-dim)">Pas de flashcards disponibles.</p>'; return; }
  const pct = Math.round((flashIdx / cards.length) * 100);
  const card = cards[flashIdx];
  c.innerHTML = header +
    `<div class="flash-counter">${flashIdx+1} / ${cards.length}</div>
     <div class="flash-progress"><div class="flash-progress-bar" style="width:${pct}%"></div></div>
     <p class="flash-hint">Cliquez sur la carte pour révéler la réponse</p>
     <div class="flashcard-wrapper">
       <div class="flashcard${flashFlipped?' flipped':''}" id="fc" onclick="flipCard()">
         <div class="card-face front"><div class="card-label">Question</div><div class="card-text">${card.q}</div></div>
         <div class="card-face back"><div class="card-label">Réponse</div><div class="card-text back-text">${card.a}</div></div>
       </div>
     </div>
     <div class="flash-nav">
       <button onclick="flashNav(-1)">← Précédente</button>
       <button onclick="flashNav(1)">Suivante →</button>
     </div>`;
}
function flipCard() {
  flashFlipped = !flashFlipped;
  const fc = document.getElementById('fc');
  if (fc) fc.classList.toggle('flipped');
}
function flashNav(dir) {
  const cards = currentCh.flashcards || [];
  flashIdx = (flashIdx + dir + cards.length) % cards.length;
  flashFlipped = false;
  renderMode();
}

function renderQCM(c, header) {
  const qs = currentCh.qcm || [];
  if (!qs.length) { c.innerHTML = header + '<p style="color:var(--text-dim)">Pas de QCM disponible.</p>'; return; }
  const answered = Object.keys(qcmAnswered).length;
  const correct = Object.values(qcmAnswered).filter(v=>v.correct).length;
  const scoreHtml = answered > 0 ? `<span class="qcm-score-badge">${correct}/${answered} correctes</span>` : '';
  let html = header + `<div class="qcm-header"><span style="color:var(--text-dim);font-size:13px">${qs.length} questions</span>${scoreHtml}</div>`;
  qs.forEach((q, qi) => {
    const isAns = qcmAnswered[qi] !== undefined;
    html += `<div class="qcm-q${isAns?' answered':''}" id="qblock-${qi}">
      <div class="qcm-num">Q${qi+1}</div>
      <div class="qcm-q-text">${q.q}</div>
      <div class="opt-list">
        ${q.opts.map((o,oi)=>{
          let cls = '';
          if (isAns) {
            if (oi === q.correct) cls = 'correct';
            else if (qcmAnswered[qi]?.chosen === oi) cls = 'wrong';
          }
          return `<button class="opt-btn ${cls}" ${isAns?'disabled':''} onclick="answerQCM(${qi},${oi})">${o}</button>`;
        }).join('')}
      </div>
      <div class="expl-box${isAns?' show':''}">${q.expl}</div>
    </div>`;
  });
  html += `<button class="qcm-reset" onclick="resetQCM()">🔄 Recommencer</button>`;
  c.innerHTML = html;
}
function answerQCM(qi, chosen) {
  const q = currentCh.qcm[qi];
  qcmAnswered[qi] = { chosen, correct: chosen === q.correct };
  renderMode();
  setTimeout(() => {
    const el = document.getElementById('qblock-'+qi);
    if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 100);
}
function resetQCM() { qcmAnswered = {}; renderMode(); }

function renderCas(c, header) {
  const cas = currentCh.cas;
  if (!cas) { c.innerHTML = header + '<p style="color:var(--text-dim)">Pas de cas pratique disponible.</p>'; return; }
  const qs = cas.questions || [];
  c.innerHTML = header +
    `<div class="metho-box">
      <h4>🔑 Méthode du cas pratique (4 étapes)</h4>
      <div class="metho-steps">
        <div class="metho-step"><div class="step-num">01</div><div class="step-title">Faits qualifiés</div><div class="step-desc">Extraire et qualifier juridiquement les faits</div></div>
        <div class="metho-step"><div class="step-num">02</div><div class="step-title">Problème de droit</div><div class="step-desc">Phrase interrogative générale</div></div>
        <div class="metho-step"><div class="step-num">03</div><div class="step-title">Règle de droit</div><div class="step-desc">Définitions + principe + exceptions + sanctions</div></div>
        <div class="metho-step"><div class="step-num">04</div><div class="step-title">Application aux faits</div><div class="step-desc">Commence par « En l'espèce… »</div></div>
      </div>
    </div>
    <div class="cas-context"><h4>📋 Contexte</h4><p>${cas.contexte}</p></div>
    ${qs.map(q=>`<div class="cas-q-block"><h4>${q}</h4><textarea placeholder="Rédigez votre réponse en utilisant les 4 étapes de la méthode..."></textarea></div>`).join('')}
    <button class="corr-toggle-btn" onclick="toggleCorr(this)">👁 Afficher le corrigé</button>
    <div class="corr-body" id="corr-body">${cas.correction}</div>`;
}
function toggleCorr(btn) {
  const body = document.getElementById('corr-body');
  const show = body.classList.toggle('show');
  btn.textContent = show ? '🙈 Masquer le corrigé' : '👁 Afficher le corrigé';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// Init
buildNav();
renderWelcome();
setMode('cours');
</script>
</body>
</html>
