{
  id:'3.4', partie:'P3 — Opérations courantes', title:'La paie',
  cours:`<h3>I. Les éléments constitutifs de la paie</h3>
<div class="formula-box">Salaire BRUT
− Cotisations sociales SALARIALES
= Salaire NET
− Acomptes et saisies
− Prélèvement à la source (IR)
= Net à payer</div>
<p>Les cotisations sociales patronales sont en sus et constituent le coût du travail pour l\'employeur.</p>
<div class="formula-box">Coût du travail = Salaire brut + Cotisations patronales</div>
<h3>II. Les organismes collecteurs</h3>
<ul>
<li><b>URSSAF</b> : cotisations de Sécurité sociale et d\'Allocations familiales</li>
<li><b>AGIRC-ARRCO</b> : retraite complémentaire (cadres et non-cadres)</li>
<li><b>Complémentaire santé / prévoyance</b></li>
</ul>
<p>Depuis le 1er juillet 2017, la <b>DSN</b> (Déclaration Sociale Nominative) remplace la plupart des déclarations périodiques. Transmission mensuelle dématérialisée.</p>
<h3>III. Les comptes de paie à connaître</h3>
<table>
<tr><th>Compte</th><th>Nature</th><th>Utilisation</th></tr>
<tr><td><b>6411</b></td><td>Charge</td><td>Salaires bruts (rémunérations, salaires et appointements)</td></tr>
<tr><td><b>6414</b></td><td>Charge</td><td>Avantages en nature (logement, véhicule…)</td></tr>
<tr><td><b>645</b></td><td>Charge</td><td>Cotisations sociales patronales</td></tr>
<tr><td><b>421</b></td><td>Passif</td><td>Personnel, rémunérations dues (dette envers salariés)</td></tr>
<tr><td><b>431</b></td><td>Passif</td><td>Sécurité sociale (URSSAF)</td></tr>
<tr><td><b>437</b></td><td>Passif</td><td>Autres organismes sociaux (AGIRC-ARRCO…)</td></tr>
<tr><td><b>425</b></td><td>Actif</td><td>Avances et acomptes sur salaires</td></tr>
<tr><td><b>427</b></td><td>Passif</td><td>Oppositions (saisies sur salaires)</td></tr>
<tr><td><b>4421</b></td><td>Passif</td><td>Prélèvement à la source (IR)</td></tr>
</table>
<h3>IV. Les 4 écritures de paie</h3>
<h4>1) Versement de l\'acompte (en cours de mois)</h4>
<table class="compta-table">
<tr><td>D 425 Avances et acomptes sur salaires</td><td class="debit">Montant acompte</td><td></td></tr>
<tr><td>C 512 Banque</td><td></td><td class="credit">Montant acompte</td></tr>
</table>

{
  id:'4.1', partie:'P4 — Opérations liées aux règlements', title:'La TVA — Fait générateur et déclarations',
  cours:`<h3>I. Fait générateur et exigibilité de la TVA</h3>
<p><b>Fait générateur</b> = fait qui donne naissance à la TVA.<br><b>Exigibilité</b> = événement qui permet au Trésor d\'exiger le paiement.</p>
<table>
<tr><th>Type d\'opération</th><th>Fait générateur</th><th>Exigibilité</th></tr>
<tr><td><b>Livraison de biens</b></td><td>Livraison</td><td>Livraison (simultané)</td></tr>
<tr><td><b>Prestations de services</b></td><td>Exécution du service</td><td>Encaissement (dissocié)</td></tr>
<tr><td><b>Prestations (option débits)</b></td><td>Exécution</td><td>Facturation (option)</td></tr>
</table>
<h4>Conséquences pour les acomptes</h4>
<ul>
<li><b>Livraison de biens</b> : acompte reçu SANS TVA (livraison pas encore faite) → compte 4191</li>
<li><b>Prestations de services</b> : acompte reçu AVEC TVA (encaissement = exigibilité) → TVA immédiate</li>
</ul>
<h3>II. Comptabilisation avec acompte — livraison de biens</h3>
<p>Réception acompte : D 512 / C 4191 (sans TVA).<br>Facturation : D 411 / C 4191 + 707 + 44571 (TVA sur total).<br>Solde : D 512 / C 411.</p>
<h3>III. Comptabilisation avec acompte — prestations de services</h3>
<p>Réception acompte : D 512 / C 4191 + C 44571 (TVA immédiate) + D 44580 TVA à régulariser.<br>Facturation : D 411 / C 706 + 44580 + solde TVA.<br>Règlement solde : TVA sur solde via 44580.</p>
<h3>IV. La déclaration de TVA (régime réel normal)</h3>
<div class="formula-box">TVA à décaisser = TVA collectée (44571)
                 − TVA déductible immobilisations (44562)
                 − TVA déductible autres biens et services (44566)</div>
<p>Déclaration <b>CA3</b> mensuelle (ou trimestrielle si TVA < 4 000 €/an). Versement entre le 15 et le 24 du mois suivant.</p>
<h4>Écriture de liquidation — TVA à payer</h4>
<table class="compta-table">
<tr><td>D 44571 TVA collectée</td><td class="debit">XXX</td><td></td></tr>
<tr><td>C 44562 TVA immo</td><td></td><td class="credit">XXX</td></tr>
<tr><td>C 44566 TVA autres B&S</td><td></td><td class="credit">XXX</td></tr>
<tr><td>C 44551 TVA à décaisser</td><td></td><td class="credit">Solde</td></tr>
</table>
<h4>Si crédit de TVA</h4>
<table class="compta-table">
<tr><td>D 44571 + D 44567 crédit de TVA à reporter</td><td class="debit">XXX</td><td></td></tr>
<tr><td>C 44562 + C 44566</td><td></td><td class="credit">XXX</td></tr>
</table>
<h3>V. TVA intracommunautaire</h3>
<ul>
<li><b>Livraisons intracom.</b> (ventes vers UE) : exonérées de TVA (comme exportations)</li>
<li><b>Acquisitions intracom.</b> (achats depuis UE) : autoliquidation → D 44566 / C 4452</li>
</ul>
<div class="formula-box">Acquisition intracom. :
D 607 Achats de marchandises       HT
D 44566(2) TVA déductible          TVA fr.
  C 401(.12) Fournisseurs UE              HT
  C 4452 TVA due intracom.               TVA fr.</div>
<h3>VI. Régime réel simplifié</h3>
<p>2 acomptes semestriels : <b>55 %</b> en juillet + <b>40 %</b> en décembre. Régularisation annuelle via déclaration <b>CA12</b> début mai N+1.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Biens</b> : TVA sur livraison ; acompte sans TVA</li>
<li><b>Services</b> : TVA sur encaissement ; acompte avec TVA</li>
<li><b>44551</b> TVA à décaisser ; <b>44567</b> crédit de TVA à reporter</li>
<li><b>4452</b> TVA due intracommunautaire (acquisitions UE)</li>
<li><b>Réel normal</b> : CA3 mensuelle ; <b>Réel simplifié</b> : acomptes + CA12 annuelle</li>
</ul></div>`,

{
  id:'4.2', partie:'P4 — Opérations liées aux règlements', title:'Les effets de commerce',
  cours:`<h3>I. La lettre de change (traite)</h3>
<p>Créée par le <b>créancier</b> (tireur), donnant ordre au <b>débiteur</b> (tiré) de payer une somme à une échéance donnée au profit d\'un bénéficiaire.</p>
<ul>
<li><b>Tireur</b> : créancier qui émet la traite (souvent = bénéficiaire)</li>
<li><b>Tiré</b> : débiteur qui accepte et règle à l\'échéance</li>
<li><b>Bénéficiaire</b> : personne qui encaisse (souvent = tireur)</li>
<li><b>Domiciliataire</b> : banque du tiré qui paie à l\'échéance</li>
</ul>
<h3>II. Le billet à ordre</h3>
<p>Créé par le <b>débiteur</b> (client), qui s\'engage à payer. ≠ Lettre de change (créée par le créancier). Moins utilisé en pratique.</p>
<h3>III. Création de l\'effet</h3>
<table class="compta-table">
<tr><th></th><th>Chez le fournisseur (tireur)</th><th>Chez le client (tiré)</th></tr>
<tr><td>Création</td><td>D 413 Clients-effets à recevoir / C 411</td><td>D 401 / C 403 Fournisseurs-effets à payer</td></tr>
</table>
<h3>IV. Remise à l\'encaissement</h3>
<p>Le fournisseur dépose la traite en banque pour encaissement à l\'échéance. La banque prélève une <b>commission d\'encaissement</b> (TVA 20 %).</p>
<table class="compta-table">
<tr><td>Remise en banque</td><td>D 5113 Effets à l\'encaissement / C 413</td><td></td></tr>
<tr><td>Encaissement + frais</td><td>D 627 Services bancaires + 44566 TVA / D 512 (net) / C 5113</td><td>D 403 / C 512</td></tr>
</table>
<h3>V. Remise à l\'escompte</h3>
<p>La banque achète l\'effet avant l\'échéance et verse immédiatement la somme, diminuée des <b>agios</b> (intérêts + commissions).</p>
<div class="formula-box">Intérêts = Valeur nominale × taux annuel × nombre de jours / 360
Agios = Intérêts + Commissions diverses (TVA 20 % sur commissions fixes seulement)
Montant net = Valeur nominale − Agios</div>
<h4>Calcul du nombre de jours</h4>
<p>1er mois : jours réels. Mois suivants entiers : 30 jours chacun. Dernier mois incomplet : jours réels.</p>
<table class="compta-table">
<tr><td>Remise à l\'escompte</td><td>D 5114 Effets à l\'escompte / C 413</td><td></td></tr>
<tr><td>Réception bordereau</td><td>D 627 commissions + D 44566 TVA + D 6616 Escompte + D 512 (net) / C 5114</td><td></td></tr>
<tr><td>Règlement à l\'échéance</td><td>—</td><td>D 403 / C 512</td></tr>
</table>
<h3>VI. LCR magnétique</h3>
<p>Lettre de change dématérialisée. <b>Pas de compte 413/403</b> : la créance reste en 411 et la dette en 401 jusqu\'à l\'échéance. Si "escompte" de LCR → <b>concours bancaire courant (519)</b>, pas un vrai escompte.</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Lettre de change</b> = créée par le créancier ; <b>Billet à ordre</b> = créé par le débiteur</li>
<li><b>413</b> Effets à recevoir (actif fournisseur) ; <b>403</b> Effets à payer (passif client)</li>
<li><b>Encaissement</b> : commission (627) + TVA 20 %</li>
<li><b>Escompte</b> : intérêts (6616) + commissions (627) + TVA sur commissions seulement</li>
<li><b>LCR magnétique</b> : 411/401 maintenu ; escompte = CBC (519)</li>
</ul></div>`,
  vocab:[
    {t:'Lettre de change (traite)',d:'Titre créé par le créancier (tireur) donnant ordre au débiteur (tiré) de payer à une échéance donnée.'},

{
  id:'4.3', partie:'P4 — Opérations liées aux règlements', title:'Rapprochement bancaire et lettrage',
  cours:`<h3>I. Le rapprochement bancaire</h3>
<p>Le compte <b>512 Banque</b> (actif, solde débiteur) et le relevé bancaire fonctionnent de façon <b>opposée</b> (miroir) : ce qui est débit chez l\'entreprise est crédit chez la banque.</p>
<h4>Pourquoi des différences ?</h4>
<ul>
<li>Chèques émis non encore encaissés par les bénéficiaires</li>
<li>Remises non encore créditées par la banque</li>
<li>Opérations enregistrées par la banque non encore comptabilisées (agios, prélèvements)</li>
</ul>
<h4>Étapes du rapprochement bancaire</h4>
<ol>
<li>Vérifier les <b>soldes initiaux</b> (pointage si différence)</li>
<li>Remplir l\'état de rapprochement : pointer les opérations communes</li>
<li>Dans la colonne "512 Banque" : ajouter les opérations présentes sur le relevé mais pas encore comptabilisées</li>
<li>Dans la colonne "Relevé banque" : ajouter les opérations comptabilisées mais pas encore sur le relevé</li>
<li>Les soldes finaux des deux colonnes doivent être <b>égaux</b></li>
<li>Enregistrer au journal les opérations non encore comptabilisées</li>
</ol>
<h3>II. Le lettrage</h3>
<p>Technique permettant de <b>rapprocher des montants dans les comptes de tiers</b> (401 Fournisseurs, 411 Clients) : une facture et son règlement reçoivent la même lettre.</p>
<h4>Intérêt du lettrage</h4>
<ul>
<li>Identifier les factures fournisseurs <b>non encore réglées</b></li>
<li>Identifier les factures clients <b>en attente d\'encaissement</b></li>
<li>Détecter des anomalies ou des doublons</li>
</ul>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>512 Banque</b> et relevé fonctionnent en <b>miroir inverse</b></li>
<li>Objectif rapprochement : deux soldes finaux <b>égaux</b></li>
<li>Après rapprochement : enregistrer les opérations manquantes (agios, frais…)</li>
<li><b>Lettrage</b> = rapprochement factures/règlements dans les comptes de tiers (401, 411)</li>
</ul></div>`,
  vocab:[
    {t:'Rapprochement bancaire',d:'Vérification de la concordance entre le solde du compte 512 Banque et le solde du relevé bancaire. Permet de détecter les opérations manquantes.'},
    {t:'État de rapprochement',d:'Document à deux colonnes (compte 512 / relevé banque) permettant d\'identifier les écarts et d\'atteindre des soldes ajustés identiques.'},
    {t:'Lettrage',d:'Technique d\'apurement des comptes de tiers (401, 411) consistant à affecter une même lettre à une facture et à son règlement correspondant.'},
  ],
  flashcards:[
    {q:'Pourquoi le compte 512 Banque et le relevé bancaire fonctionnent-ils en miroir ?',a:'Pour la banque, le compte de l\'entreprise est une <b>dette</b> (passif) : un dépôt est un crédit pour la banque. Pour l\'entreprise, la banque est un <b>actif</b> (512 débiteur). D\'où l\'inversion.'},
    {q:'Quelles sont les étapes du rapprochement bancaire ?',a:'1) Vérifier soldes initiaux<br>2) Remplir l\'état : pointer opérations communes<br>3) Colonne 512 : + opérations relevé non comptabilisées<br>4) Colonne relevé : + opérations comptabilisées non sur relevé<br>5) Soldes finaux = égaux<br>6) Enregistrer les opérations manquantes'},
    {q:'À quoi sert le lettrage ?',a:'À rapprocher des factures et leurs règlements dans les comptes de tiers (401, 411). Permet d\'identifier les factures non réglées et les créances en attente.'},
  ],
  qcm:[
    {q:'Lors d\'un rapprochement bancaire, un chèque émis mais non encore encaissé par le bénéficiaire :',opts:['A. Apparaît dans les deux colonnes','B. Est dans la colonne 512 mais pas encore sur le relevé','C. Est sur le relevé mais pas dans le 512','D. Ne doit pas apparaître'],correct:1,expl:'Le chèque est déjà comptabilisé (C 512), mais la banque ne l\'a pas encore débité. Il sera donc à inscrire dans la colonne relevé pour équilibrer.'},
    {q:'À la fin de l\'état de rapprochement bancaire :',opts:['A. Les soldes initiaux doivent être égaux','B. Les soldes finaux ajustés des deux colonnes doivent être égaux','C. Le solde du 512 doit toujours être débiteur','D. Il doit exister une différence entre les deux colonnes'],correct:1,expl:'L\'objectif est d\'aboutir à deux soldes finaux (ajustés) identiques, prouvant que les écarts sont expliqués.'},
  ],
  cas:{
    contexte:'Compte 512 de l\'entreprise CRUNCH au 31/12 : solde débiteur 13 028 €. Relevé bancaire : solde créditeur 11 608 €. Écarts identifiés : remise chèque CARROUF comptabilisée mais pas créditée par la banque (3 020 €), frais bancaires débités par la banque non comptabilisés (120 €), prélèvement EDF (800 €) comptabilisé, virement fournisseur (250 €) non comptabilisé.',
    questions:['<b>Q1</b> : Construisez l\'état de rapprochement pour égaliser les deux soldes.','<b>Q2</b> : Quelles écritures comptables faut-il passer après le rapprochement ?'],
    correction:`Q1 — État de rapprochement (schéma simplifié) :

Compte 512 Banque (entreprise)     | Relevé bancaire (banque)
Solde initial : 13 028 (D)        | Solde initial : 11 608 (C)

À ajouter dans 512 :               | À ajouter dans relevé :
− Agios non comptabilisés : −120   | + Chèque CARROUF à créditer : +3 020
− Virement fournisseur non         |
  comptabilisé : −250              |

Solde ajusté 512 : 13 028 − 120 − 250 = 12 658
Solde ajusté relevé : 11 608 + 3 020 − (voir analyse) → 12 658

(Le rapprochement complet nécessite de pointer toutes les opérations communes. Le solde final ajusté des deux colonnes doit être 12 658.)

Q2 — Écritures à enregistrer (opérations trouvées lors du rapprochement) :

Agios bancaires (120 €) :
D 627 Services bancaires           100 (HT si TVA applicable)
D 44566 TVA déductible              20
  C 512 Banque                              120

Virement fournisseur (250 €) :
D 401 Fournisseurs                 250
  C 512 Banque                              250`
  }
},
{
  id:'5.1', partie:'P5 — Investissement et financement', title:'Les immobilisations corporelles et incorporelles',
  cours:`<h3>I. Définitions</h3>
<p><b>Immobilisation corporelle</b> : actif physique destiné à être utilisé dans la production, loué à des tiers ou pour la gestion interne, dont l\'utilisation est attendue au-delà de l\'exercice.</p>
<p><b>Immobilisation incorporelle</b> : actif non monétaire sans substance physique (logiciel, brevet, fonds commercial…).</p>
<h3>II. Coût d\'acquisition</h3>
<div class="formula-box">Coût d\'acquisition =
  Prix d\'achat
  + Droits de douane et taxes non récupérables
  − Remises, rabais et escomptes
  + Coûts directement attribuables (transport, installation, mise en service)
  + Quote-part des coûts de démantèlement (si applicable)

Optionnellement : frais d\'actes, honoraires, frais de mutation
→ Au choix : intégrés au coût d\'acquisition OU en charges</div>
<h4>Cas particulier : véhicule de tourisme</h4>
<ul>
<li>TVA non récupérable → intégrée au coût d\'entrée (TTC)</li>
<li>Carte grise : tendance actuelle → immobilisation</li>
<li>Essence : toujours en charge (606)</li>
<li>Gazole : TVA déductible à <b>80 %</b> (tourisme) / 100 % (utilitaire)</li>
</ul>
<h3>III. La comptabilisation des immobilisations</h3>
<table class="compta-table">
<tr><th>Débit</th><th>N°</th><th>Intitulé</th><th>Crédit</th></tr>
<tr><td class="debit">Coût</td><td>21xx</td><td>Immobilisation corporelle (ex: 2131 Bâtiments)</td><td></td></tr>
<tr><td class="debit">TVA</td><td>44562</td><td>TVA déductible sur immobilisations</td><td></td></tr>
<tr><td></td><td>404</td><td>Fournisseurs d\'immobilisations</td><td class="credit">TTC</td></tr>
</table>
<h4>Acomptes sur immobilisations</h4>
<p>Utiliser le compte <b>238</b> (immo corporelles) ou <b>237</b> (immo incorporelles), pas le 4091.</p>
<h3>IV. Production immobilisée (livraison à soi-même)</h3>
<p>Quand l\'entreprise construit elle-même une immobilisation, on utilise le compte <b>722 Production immobilisée</b> (produit). Le coût comprend : matériaux + main d\'œuvre directe.</p>
<table class="compta-table">
<tr><td>D 2131 Bâtiments</td><td class="debit">Coût total</td><td></td></tr>
<tr><td>C 722 Production immobilisée</td><td></td><td class="credit">Coût total</td></tr>
</table>
<p>Pour les travaux en cours (non terminés au 31/12) → compte <b>231 Immobilisations corporelles en cours</b>.</p>
<h3>V. Le crédit-bail</h3>
<p>Contrat de location avec <b>option d\'achat</b> en fin de période. L\'immobilisation n\'est comptabilisée qu\'à la <b>levée de l\'option</b>.</p>
<ul>
<li>Loyers → <b>612 Redevances de crédit-bail</b> (charge)</li>
<li>Caution à la signature → <b>275 Dépôts et cautionnements</b></li>
<li>Levée de l\'option → D 21xx + 44562 / C 404</li>
</ul>
<h3>VI. Les frais de développement</h3>
<p>Frais de <b>recherche</b> : toujours en charges (non immobilisables).<br>Frais de <b>développement</b> : peuvent être activés (immobilisés) si 6 conditions sont réunies (faisabilité, intention, capacité à utiliser ou vendre, avantages futurs probables, ressources disponibles, évaluation fiable).</p>
<h3>VII. Logiciels</h3>
<p>Logiciel <b>acquis</b> : compte 205, amorti dès la date d\'acquisition.<br>Logiciel <b>créé</b> : coût = analyse organique + programmation + tests + documentation (pas la formation ni l\'analyse fonctionnelle).</p>
<div class="retain-box"><h3>📌 À retenir</h3><ul>
<li><b>Coût acquisition</b> = prix + frais directs − remises − TVA récupérable</li>
<li><b>44562</b> = TVA déductible sur immobilisations (≠ 44566 pour autres achats)</li>
<li><b>238</b> = acomptes immo corporelles ; <b>237</b> = acomptes immo incorporelles</li>
<li><b>722</b> Production immobilisée = produit lors d\'une LASM</li>
<li><b>Crédit-bail</b> : immo activée seulement à la levée d\'option</li>
<li><b>Recherche → charges</b> ; <b>Développement → peut être immobilisé</b></li>
<li><b>Logiciel créé</b> : analyse organique + code + tests + doc (pas formation)</li>
</ul></div>`,
  vocab:[

{
  id:'5.2', partie:'P5 — Investissement et financement', title:'Titres financiers et opérations de financement',
  cours:`<h3>I. Classification des titres financiers</h3>
<table>
<tr><th>Nature</th><th>Intention</th><th>Compte PCG</th></tr>
<tr><td><b>Valeurs mobilières de placement (VMP)</b></td><td>Placement court terme, plus-value rapide</td><td>50x (503 actions, 506 obligations, 507 bons)</td></tr>
<tr><td><b>Titres de participation</b></td><td>Contrôle ou influence durable (> 10 %)</td><td>261</td></tr>
<tr><td><b>Titres immobilisés</b></td><td>Détention durable mais pas participation</td><td>271 (propriété), 272 (créance)</td></tr>
<tr><td><b>TIAP</b></td><td>Portefeuille détenu durablement pour rentabilité</td><td>273</td></tr>
</table>
<h3>II. Évaluation à l\'acquisition</h3>
<div class="formula-box">Coût d\'acquisition = Prix d\'achat + coûts directement attribuables
(Honoraires, commissions : en charges ou incorporés selon option)</div>
<h4>Actions</h4>
<ul>
<li>Coût = prix par action × quantité + frais (selon option)</li>
<li>Frais sur titres (6271) + TVA (44566) si en charges</li>
</ul>
<h4>Obligations</h4>
<div class="formula-box">Prix d\'achat = cours hors fraction d'intérêt couru (% du nominal)
             + fraction d'intérêt couru (calculée prorata temporis)
Coupon suivant = intérêt couru déjà payé → produit financier réduit</div>
<h3>III. Comptabilisation — Actions</h3>
<table class="compta-table">
<tr><td>D 261 Titres de participation (VMP si CT)</td><td class="debit">Prix achat</td><td></td></tr>
<tr><td>C 404 ou 512</td><td></td><td class="credit">Prix achat</td></tr>
</table>
<h4>Obligations (VMP)</h4>
<table class="compta-table">
<tr><td>D 506 Obligations</td><td class="debit">Cours pied du coupon</td><td></td></tr>
<tr><td>D 5088 Intérêts courus</td><td class="debit">Fraction intérêt couru</td><td></td></tr>
<tr><td>C 512 Banque</td><td></td><td class="credit">Total payé</td></tr>
</table>
<h3>IV. Revenus des titres</h3>
<table>
<tr><th>Type de titre</th><th>Revenu</th><th>Compte produit</th></tr>
<tr><td>Titres de participation</td><td>Dividendes</td><td>761</td></tr>
<tr><td>Autres immo financières</td><td>Intérêts/dividendes</td><td>762</td></tr>
<tr><td>VMP</td><td>Dividendes/intérêts</td><td>764</td></tr>
</table>
<h3>V. Les opérations de financement</h3>
<h4>A. Financement par capitaux propres</h4>
<ul>
<li><b>Capital</b> : apports (101)</li>
<li><b>Autofinancement</b> : bénéfices non distribués</li>
<li><b>Subventions d\'investissement</b> (131, 138) : acquisition d\'immobilisation</li>

• Annuités constantes : mensualité fixe (formule : a = C₀ × i / (1 − (1+i)^−n))

   // ============================================================
// APPLICATION LOGIC (Moteur interactif du site)
// ============================================================
let currentSubject = 'droit';
let currentCh = null;
let currentMode = 'cours';
let flashIdx = 0;
let flashFlipped = false;
let qcmAnswered = {};

function getChapters() {
  return currentSubject === 'droit' ? DROIT_CHAPTERS : COMPTA_CHAPTERS;
}

function changeSubject(subj) {
  currentSubject = subj;
  document.body.className = 'theme-' + subj;
  
  // Update UI texts depending on subject
  const brand = document.querySelector('.brand');
  const selector = document.getElementById('subject-selector');
  if (subj === 'droit') {
    brand.innerHTML = 'DCG1 <span>Droit</span>';
    selector.value = 'droit';
  } else {
    brand.innerHTML = 'DCG <span>Compta</span>';
    selector.value = 'compta';
  }

  currentCh = null;
  buildNav();
  renderWelcome();
  closeSidebar();
}

function buildNav() {
  const tree = document.getElementById('nav-tree');
  tree.innerHTML = '';
  const parties = {};
  
  const chaptersList = getChapters();
  
  chaptersList.forEach(ch => {
    if (!parties[ch.partie]) parties[ch.partie] = [];
    parties[ch.partie].push(ch);
  });
  
  Object.entries(parties).forEach(([p, chs]) => {
    const g = document.createElement('div');
    g.className = 'partie-group';
    g.innerHTML = `<div class="partie-label">${p}</div>`;
    chs.forEach(ch => {
      const b = document.createElement('button');
      b.className = 'ch-btn';
      b.id = 'nav-' + ch.id;
      b.innerHTML = `<span class="ch-id">${ch.id}</span>${ch.title}`;
      b.onclick = () => loadChapter(ch.id);
      g.appendChild(b);
    });
    tree.appendChild(g);
  });
}

function loadChapter(id) {
  currentCh = getChapters().find(c => c.id === id);
  flashIdx = 0; flashFlipped = false; qcmAnswered = {};
  document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + id);
  if (nb) { nb.classList.add('active'); nb.scrollIntoView({block:'nearest'}); }
  document.getElementById('chapter-title-bar').textContent = currentCh.title;
  renderMode();
  if (window.innerWidth <= 768) closeSidebar();
}

function setMode(m) {
  currentMode = m;
  const labels = {cours:'📖 Cours', vocab:'📚 Vocabulaire', flash:'🃏 Flashcards', qcm:'✅ QCM', cas:'✍️ Pratique'};
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === labels[m]);
  });
  document.querySelectorAll('.mob-mode-btn').forEach(b => {
    const txt = b.textContent.replace(/[^a-zA-ZÀ-ÿ]/g,'').trim();
    const map = {'Cours':'cours','Vocab':'vocab','Flash':'flash','QCM':'qcm','Pratique':'cas'};
    b.classList.toggle('active', map[txt] === m);
  });
  flashIdx = 0; flashFlipped = false; qcmAnswered = {};
  renderMode();
}

function renderMode() {
  const c = document.getElementById('content');
  if (!currentCh) { renderWelcome(); return; }
  c.className = '';
  c.innerHTML = '';
  void c.offsetWidth;
  c.classList.add('fade-up');
  
  const header = `<div class="section-header">
    <div class="partie-tag">${currentCh.partie}</div>
    <div class="ch-id-tag">${currentCh.id}</div>
    <h2>${currentCh.title}</h2>
  </div>`;
  
  if (currentMode === 'cours') c.innerHTML = header + `<div class="cours-body">${currentCh.cours}</div>`;
  else if (currentMode === 'vocab') renderVocab(c, header);
  else if (currentMode === 'flash') renderFlash(c, header);
  else if (currentMode === 'qcm') renderQCM(c, header);
  else if (currentMode === 'cas') renderCas(c, header);
}

function renderWelcome() {
  const c = document.getElementById('content');
  const chaptersList = getChapters();
  
  const title = currentSubject === 'droit' ? 'DCG1 Droit<br>Programme Complet' : 'DCG<br>Introduction à la Compta';
  const total = chaptersList.length;
  const totalQcm = chaptersList.reduce((a,ch)=>a+(ch.qcm||[]).length,0);
  const totalFlash = chaptersList.reduce((a,ch)=>a+(ch.flashcards||[]).length,0);
  const totalVocab = chaptersList.reduce((a,ch)=>a+(ch.vocab||[]).length,0);
  
  c.innerHTML = `<div class="welcome-screen fade-up">
    <h2>${title}</h2>
    <p>Sélectionnez une matière en haut à gauche. Cours complets, vocabulaire juridique/comptable, flashcards, QCM et cas pratiques pour réussir l'examen national.</p>
    <div class="welcome-grid">
      <div class="welcome-card"><div class="wc-num">${total}</div><div class="wc-label">Chapitres</div></div>
      <div class="welcome-card"><div class="wc-num">${totalVocab}</div><div class="wc-label">Termes clés</div></div>
      <div class="welcome-card"><div class="wc-num">${totalFlash}</div><div class="wc-label">Flashcards</div></div>
      <div class="welcome-card"><div class="wc-num">${totalQcm}</div><div class="wc-label">Questions QCM</div></div>
    </div>
  </div>`;
  document.getElementById('chapter-title-bar').textContent = 'Bienvenue';
}

function renderVocab(c, header) {
  const terms = currentCh.vocab || [];
  c.innerHTML = header +
    `<div class="vocab-search"><input type="text" placeholder="Rechercher un terme..." id="vocab-input" oninput="filterVocab()" /></div>
     <div class="vocab-count" id="vocab-count">${terms.length} terme${terms.length>1?'s':''}</div>
     <div class="vocab-grid" id="vocab-grid"></div>`;
  renderVocabCards(terms);
}

function renderVocabCards(terms) {
  const grid = document.getElementById('vocab-grid');
  if (!grid) return;
  grid.innerHTML = terms.map((t,i) =>
    `<div class="vocab-card" id="vc-${i}" onclick="toggleVocab(${i})">
      <div class="vt">${t.t}</div>
      <div class="vd">${t.d}</div>
    </div>`).join('');
}

function filterVocab() {
  const q = document.getElementById('vocab-input').value.toLowerCase();
  const terms = (currentCh.vocab||[]).filter(t => t.t.toLowerCase().includes(q) || t.d.toLowerCase().includes(q));
  document.getElementById('vocab-count').textContent = terms.length + ' terme' + (terms.length>1?'s':'');
  renderVocabCards(terms);
}

function toggleVocab(i) {
  const card = document.getElementById('vc-'+i);
  if (card) card.classList.toggle('open');
}

function renderFlash(c, header) {
  const cards = currentCh.flashcards || [];
  if (!cards.length) { c.innerHTML = header + '<p style="color:var(--text-dim)">Pas de flashcards disponibles.</p>'; return; }
  const pct = Math.round((flashIdx / cards.length) * 100);
  const card = cards[flashIdx];
  c.innerHTML = header +
    `<div class="flash-counter">${flashIdx+1} / ${cards.length}</div>
     <div class="flash-progress"><div class="flash-progress-bar" style="width:${pct}%"></div></div>
     <p class="flash-hint">Cliquez sur la carte pour révéler la réponse</p>
     <div class="flashcard-wrapper">
       <div class="flashcard${flashFlipped?' flipped':''}" id="fc" onclick="flipCard()">
         <div class="card-face front"><div class="card-label">Question</div><div class="card-text">${card.q}</div></div>
         <div class="card-face back"><div class="card-label">Réponse</div><div class="card-text">${card.a}</div></div>
       </div>
     </div>
     <div class="flash-nav">
       <button onclick="flashNav(-1)">← Précédente</button>
       <button onclick="flashNav(1)">Suivante →</button>
     </div>`;
}

function flipCard() {
  flashFlipped = !flashFlipped;
  const fc = document.getElementById('fc');
  if (fc) fc.classList.toggle('flipped');
}

function flashNav(dir) {
  const cards = currentCh.flashcards || [];
  flashIdx = (flashIdx + dir + cards.length) % cards.length;
  flashFlipped = false;
  renderMode();
}

function renderQCM(c, header) {
  const qs = currentCh.qcm || [];
  if (!qs.length) { c.innerHTML = header + '<p style="color:var(--text-dim)">Pas de QCM disponible.</p>'; return; }
  const answered = Object.keys(qcmAnswered).length;
  const correct = Object.values(qcmAnswered).filter(v=>v.correct).length;
  const scoreHtml = answered > 0 ? `<span class="qcm-score-badge">${correct}/${answered} correctes</span>` : '';
  let html = header + `<div class="qcm-header"><span style="color:var(--text-dim);font-size:13px">${qs.length} questions</span>${scoreHtml}</div>`;
  qs.forEach((q, qi) => {
    const isAns = qcmAnswered[qi] !== undefined;
    html += `<div class="qcm-q${isAns?' answered':''}" id="qblock-${qi}">
      <div class="qcm-num">Q${qi+1}</div>
      <div class="qcm-q-text">${q.q}</div>
      <div class="opt-list">
        ${q.opts.map((o,oi)=>{
          let cls = '';
          if (isAns) {
            if (oi === q.correct) cls = 'correct';
            else if (qcmAnswered[qi]?.chosen === oi) cls = 'wrong';
          }
          return \`<button class="opt-btn \${cls}" \${isAns?'disabled':''} onclick="answerQCM(\${qi},\${oi})">\${o}</button>\`;
        }).join('')}
      </div>
      <div class="expl-box${isAns?' show':''}">${q.expl}</div>
    </div>`;
  });
  html += `<button class="qcm-reset" onclick="resetQCM()">🔄 Recommencer</button>`;
  c.innerHTML = html;
}

function answerQCM(qi, chosen) {
  const q = currentCh.qcm[qi];
  qcmAnswered[qi] = { chosen, correct: chosen === q.correct };
  renderMode();
  setTimeout(() => {
    const el = document.getElementById('qblock-'+qi);
    if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 100);
}

function resetQCM() { qcmAnswered = {}; renderMode(); }

function renderCas(c, header) {
  const cas = currentCh.cas;
  if (!cas) { c.innerHTML = header + '<p style="color:var(--text-dim)">Pas d\\'exercice disponible.</p>'; return; }
  const qs = cas.questions || [];
  
  // Custom method box depending on subject
  let methoHtml = '';
  if (currentSubject === 'droit') {
    methoHtml = `<div class="metho-box">
      <h4>🔑 Méthode du cas pratique (4 étapes)</h4>
      <div class="metho-steps">
        <div class="metho-step"><div class="step-num">01</div><div class="step-title">Faits qualifiés</div><div class="step-desc">Extraire et qualifier juridiquement les faits</div></div>
        <div class="metho-step"><div class="step-num">02</div><div class="step-title">Problème de droit</div><div class="step-desc">Phrase interrogative générale</div></div>
        <div class="metho-step"><div class="step-num">03</div><div class="step-title">Règle de droit</div><div class="step-desc">Définitions + principe + exceptions + sanctions</div></div>
        <div class="metho-step"><div class="step-num">04</div><div class="step-title">Application aux faits</div><div class="step-desc">Commence par « En l'espèce… »</div></div>
      </div>
    </div>`;
  } else {
    methoHtml = `<div class="metho-box">
      <h4>🔑 Méthode de résolution — Exercice comptable</h4>
      <div class="metho-steps">
        <div class="metho-step"><div class="step-num">01</div><div class="step-title">Analyser</div><div class="step-desc">Identifier la nature de l'opération</div></div>
        <div class="metho-step"><div class="step-num">02</div><div class="step-title">Identifier</div><div class="step-desc">Quels comptes ? Actif/passif/charge/produit ?</div></div>
        <div class="metho-step"><div class="step-num">03</div><div class="step-title">Calculer</div><div class="step-desc">Montants exacts (HT, TVA, TTC)</div></div>
        <div class="metho-step"><div class="step-num">04</div><div class="step-title">Enregistrer</div><div class="step-desc">Débit = Crédit (partie double)</div></div>
      </div>
    </div>`;
  }

  c.innerHTML = header +
    methoHtml + 
    `<div class="cas-context"><h4>📋 Énoncé</h4><p>${cas.contexte}</p></div>
    ${qs.map(q=>`<div class="cas-q-block"><h4>${q}</h4><textarea placeholder="Rédigez votre réponse en utilisant la méthode appropriée..."></textarea></div>`).join('')}
    <button class="corr-toggle-btn" onclick="toggleCorr(this)">👁 Afficher le corrigé</button>
    <div class="corr-body" id="corr-body">${cas.correction}</div>`;
}

function toggleCorr(btn) {
  const body = document.getElementById('corr-body');
  const show = body.classList.toggle('show');
  btn.textContent = show ? '🙈 Masquer le corrigé' : '👁 Afficher le corrigé';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// Initialisation au chargement
buildNav();
renderWelcome();
setMode('cours');
</script>
</body>
</html>
